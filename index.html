// LEARNER APP
// ============================================================
function LearnerApp({ user, packages, onSwitchView, onLogout }) {
  const [screen, setScreen] = useState('browse'); // browse, learn, test-setup, test, progress, course-detail, social
  const [activePkg, setActivePkg] = useState(null);
  const [testConfig, setTestConfig] = useState(null);
  const [search, setSearch] = useState('');
  const [filterStatus, setFilterStatus] = useState('all');
  const [filterSubject, setFilterSubject] = useState('');
  const [showAllYears, setShowAllYears] = useState(false);
  const [myProgress, setMyProgress] = useState([]);
  const [myResults, setMyResults] = useState([]);
  const [loadedData, setLoadedData] = useState(false);
  const [feedbackText, setFeedbackText] = useState('');
  const [feedbackRating, setFeedbackRating] = useState(0);
  const [learningRating, setLearningRating] = useState(0);
  const [testingRating, setTestingRating] = useState(0);
  // Gamification
  const [gamData, setGamData] = useState({ xp:0, streak:0, level:1, badges:[], bestStreak:0, testsCompleted:0, perfectScores:0, coursesAccessed:0 });
  const [newBadgePopup, setNewBadgePopup] = useState(null);
  // Social
  const [followSearch, setFollowSearch] = useState('');
  const [followSearchResults, setFollowSearchResults] = useState([]);
  const [following, setFollowing] = useState([]);
  const [followingData, setFollowingData] = useState({}); // {uid: {name,gam,results}}
  const [followRequests, setFollowRequests] = useState([]);
  const [mentorRequests, setMentorRequests] = useState([]);
  const [cheers, setCheers] = useState([]);

  // Load learner data
  useEffect(() => {
    if (!loadedData && firebaseConfigured) {
      Promise.all([
        DB.getLearnerProgress(user.id), DB.getTestResultsForUser(user.id), DB.getGamification(user.id),
        DB.getFollowRequests(user.id), DB.getMentorRequests(user.id), DB.getCheers(user.id), DB.getFollowing(user.id)
      ]).then(async ([prog, res, gam, fReqs, mReqs, ch, followIds]) => {
        setMyProgress(prog); setMyResults(res); setGamData(gam); setFollowRequests(fReqs);
        setMentorRequests(mReqs); setCheers(ch); setFollowing(followIds);
        // Load following user data
        if (followIds.length > 0) {
          const allUsers = await DB.getAllUsers();
          const data = {};
          for (const fid of followIds) {
            const u = allUsers.find(x=>x.uid===fid);
            if (u) {
              const [fGam, fRes] = await Promise.all([DB.getGamification(fid), DB.getTestResultsForUser(fid)]);
              data[fid] = { name: u.name, email: u.email, gam: fGam, results: fRes };
            }
          }
          setFollowingData(data);
        }
        setLoadedData(true);
      });
    }
  }, [loadedData]);

  const getProgressForPkg = (pkgId) => myProgress.find(p=>p.packageId===pkgId);
  const getResultsForPkg = (pkgId) => myResults.filter(r=>r.packageId===pkgId);
  const getBestScore = (pkgId) => { const r = getResultsForPkg(pkgId); return r.length ? Math.max(...r.map(x=>Math.round((x.correct/x.total)*100))) : null; };
  const getAttemptCount = (pkgId) => getResultsForPkg(pkgId).length;

  const subjects = [...new Set(packages.map(p=>p.subject).filter(Boolean))];

  // Smart filtering
  const filtered = packages.filter(p => {
    // Search
    if (search) {
      const q = search.toLowerCase();
      if (!(p.name||'').toLowerCase().includes(q) && !(p.subject||'').toLowerCase().includes(q) && !(p.description||'').toLowerCase().includes(q) && !(p.yearLevel||'').toLowerCase().includes(q)) return false;
    }
    if (filterSubject && p.subject !== filterSubject) return false;
    // Age-based year level filtering (hide higher years unless user opts in)
    if (!showAllYears && user.yearLevel && p.yearLevel) {
      const userYr = parseInt(user.yearLevel.replace(/\D/g,'')) || 0;
      const pkgYr = parseInt(p.yearLevel.replace(/\D/g,'')) || 0;
      if (pkgYr > userYr + 1) return false; // Show own year + 1 above, hide rest
    }
    // Status filter
    const prog = getProgressForPkg(p.id);
    const results = getResultsForPkg(p.id);
    if (filterStatus === 'new' && (prog || results.length > 0)) return false;
    if (filterStatus === 'inprogress' && (!results.length || (prog && prog.completed))) return false;
    if (filterStatus === 'completed' && (!prog || !prog.completed)) return false;
    if (filterStatus === 'all' && prog && prog.completed) return false;
    return true;
  });

  const goHome = () => { setScreen('browse'); setActivePkg(null); setTestConfig(null); };

  const markComplete = async (pkgId) => {
    await DB.saveLearnerProgress(user.id, pkgId, { completed: true });
    setMyProgress(prev => { const exists = prev.find(p=>p.packageId===pkgId); return exists ? prev.map(p=>p.packageId===pkgId?{...p,completed:true}:p) : [...prev,{packageId:pkgId,userId:user.id,completed:true}]; });
  };

  const markIncomplete = async (pkgId) => {
    await DB.saveLearnerProgress(user.id, pkgId, { completed: false });
    setMyProgress(prev => prev.map(p=>p.packageId===pkgId?{...p,completed:false}:p));
  };

  const recordAccess = async (pkg) => {
    const prog = getProgressForPkg(pkg.id);
    if (!prog) await DB.saveLearnerProgress(user.id, pkg.id, { firstAccessed: Date.now(), packageName: pkg.name });
    setMyProgress(prev => { const exists = prev.find(p=>p.packageId===pkg.id); return exists ? prev : [...prev,{packageId:pkg.id,userId:user.id,firstAccessed:Date.now(),packageName:pkg.name}]; });
  };

  const submitFeedback = async (pkg) => {
    if (!feedbackText.trim()) return;
    await DB.saveFeedback({ userId: user.id, userName: user.name, userEmail: user.email, packageId: pkg.id, packageName: pkg.name, message: feedbackText, rating: feedbackRating });
    setFeedbackText(''); setFeedbackRating(0);
    alert('Feedback submitted! The publisher will be notified.');
  };

  // Overall stats
  const totalAttempts = myResults.length;
  const avgScore = totalAttempts ? Math.round(myResults.reduce((a,r)=>a+(r.correct/r.total)*100,0)/totalAttempts) : 0;
  const coursesAccessed = myProgress.length;
  const coursesCompleted = myProgress.filter(p=>p.completed).length;

  return (
    <div className="app">
      <div className="gradient-bg" />
      <nav className="nav">
        {screen !== 'browse' && screen !== 'progress' ? (
          <button className="nav-btn" onClick={goHome}>← Back</button>
        ) : <div />}
        <div className="nav-logo">StudyFlow</div>
        <div className="nav-right">
          <span className="nav-role learner">Learner</span>
          {onSwitchView && <button className="nav-btn" onClick={()=>onSwitchView(null)}>Switch</button>}
          <span className="nav-user">{user.name}</span>
          <button className="nav-btn" onClick={onLogout}>Logout</button>
        </div>
      </nav>
      <div className="main">
        {/* Badge unlock popup */}
        {newBadgePopup && (
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.7)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setNewBadgePopup(null)}>
            <div className="card bounce-in" style={{textAlign:'center',padding:32,maxWidth:300}} onClick={e=>e.stopPropagation()}>
              <div style={{fontSize:64,marginBottom:12}}>{newBadgePopup.icon}</div>
              <h2 style={{fontSize:20,fontWeight:800,marginBottom:4}}>Badge Unlocked!</h2>
              <div style={{fontSize:16,fontWeight:700,color:'var(--primary-light)',marginBottom:4}}>{newBadgePopup.name}</div>
              <div style={{fontSize:13,color:'var(--text-secondary)',marginBottom:16}}>{newBadgePopup.desc}</div>
              <button className="btn btn-primary" onClick={()=>setNewBadgePopup(null)}>Awesome! 🎉</button>
            </div>
          </div>
        )}

        {/* Gamification bar */}
        {(screen === 'browse' || screen === 'progress' || screen === 'social') && (
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 16px',background:'var(--bg-card)',borderBottom:'1px solid var(--border)',fontSize:12}}>
            <span style={{fontWeight:800,color:'var(--primary-light)'}}>Lv{gamData.level||1}</span>
            <div style={{flex:1,height:6,background:'var(--border)',borderRadius:3,overflow:'hidden'}}>
              <div style={{height:'100%',background:'linear-gradient(90deg,var(--primary),var(--accent))',borderRadius:3,width:`${getXpForNextLevel(gamData.xp||0)?((gamData.xp||0)/getXpForNextLevel(gamData.xp||0))*100:100}%`,transition:'width .5s'}}/>
            </div>
            <span style={{color:'var(--accent)',fontWeight:600}}>{gamData.xp||0} XP</span>
            <span style={{color:gamData.streak>=3?'var(--warning)':'var(--text-muted)'}}>{gamData.streak||0}🔥</span>
            {(gamData.badges||[]).length > 0 && <span>{BADGES.filter(b=>(gamData.badges||[]).includes(b.id)).slice(-3).map(b=>b.icon).join('')}</span>}
          </div>
        )}

        {/* New course announcements */}
        {packages.some(p => {
          const prog = myProgress.find(pr=>pr.packageId===p.id);
          const daysOld = (Date.now() - (p.createdAt||0)) / 86400000;
          return daysOld < 7 && !prog; // New in last 7 days and not accessed
        }) && (screen === 'browse') && (
          <div style={{padding:'8px 16px',background:'rgba(0,206,201,.08)',borderBottom:'1px solid rgba(0,206,201,.2)'}}>
            <div style={{fontSize:12,color:'var(--accent)'}}>🆕 New courses available! Check them out below.</div>
          </div>
        )}

        {/* Cheers popup */}
        {cheers.length > 0 && (
          <div style={{padding:'8px 16px',background:'rgba(253,203,110,.1)',borderBottom:'1px solid rgba(253,203,110,.2)'}}>
            {cheers.map(c => (
              <div key={c.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 0',fontSize:12}}>
                <span>💪 <strong>{c.fromName}</strong>: {c.message}</span>
                <button className="btn btn-sm btn-ghost" style={{fontSize:10,padding:'2px 6px'}} onClick={async()=>{await DB.markCheerRead(c.id);setCheers(prev=>prev.filter(x=>x.id!==c.id));}}>✓</button>
              </div>
            ))}
          </div>
        )}

        {/* Pending requests */}
        {(followRequests.length > 0 || mentorRequests.length > 0) && (screen === 'browse' || screen === 'social') && (
          <div style={{padding:'8px 16px',background:'rgba(108,92,231,.06)',borderBottom:'1px solid var(--border)'}}>
            {followRequests.map(r => (
              <div key={r.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 0',fontSize:12}}>
                <span>👋 <strong>{r.fromName}</strong> wants to follow you</span>
                <div style={{display:'flex',gap:4}}>
                  <button className="btn btn-sm btn-success" style={{fontSize:10,padding:'2px 8px'}} onClick={async()=>{await DB.respondFollowRequest(r.id,'accepted');setFollowRequests(prev=>prev.filter(x=>x.id!==r.id));}}>Accept</button>
                  <button className="btn btn-sm btn-ghost" style={{fontSize:10,padding:'2px 8px'}} onClick={async()=>{await DB.respondFollowRequest(r.id,'declined');setFollowRequests(prev=>prev.filter(x=>x.id!==r.id));}}>Decline</button>
                </div>
              </div>
            ))}
            {mentorRequests.map(r => (
              <div key={r.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 0',fontSize:12}}>
                <span>🧭 <strong>{r.mentorName}</strong> wants to mentor you</span>
                <div style={{display:'flex',gap:4}}>
                  <button className="btn btn-sm btn-success" style={{fontSize:10,padding:'2px 8px'}} onClick={async()=>{await DB.respondMentorRequest(r.id,'accepted');setMentorRequests(prev=>prev.filter(x=>x.id!==r.id));}}>Accept</button>
                  <button className="btn btn-sm btn-ghost" style={{fontSize:10,padding:'2px 8px'}} onClick={async()=>{await DB.respondMentorRequest(r.id,'declined');setMentorRequests(prev=>prev.filter(x=>x.id!==r.id));}}>Decline</button>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* Tab bar */}
        {(screen === 'browse' || screen === 'progress' || screen === 'social') && (
          <div style={{display:'flex',borderBottom:'1px solid var(--border)',padding:'0 16px'}}>
            <button className={`tab ${screen==='browse'?'active':''}`} onClick={()=>setScreen('browse')}>📚 Courses</button>
            <button className={`tab ${screen==='progress'?'active':''}`} onClick={()=>setScreen('progress')}>📊 Progress</button>
            <button className={`tab ${screen==='social'?'active':''}`} onClick={()=>setScreen('social')}>👥 Social</button>
          </div>
        )}

        {screen === 'browse' && (
          <div className="page fade-in">
            {/* Search bar */}
            <div style={{marginBottom:12}}>
              <input className="form-input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search courses by name, subject, year level..." style={{fontSize:14}} />
            </div>

            {/* Smart filters */}
            <div className="filters" style={{marginBottom:12}}>
              <span className={`filter-chip ${filterStatus==='all'?'active':''}`} onClick={()=>setFilterStatus('all')}>📋 Active</span>
              <span className={`filter-chip ${filterStatus==='new'?'active':''}`} onClick={()=>setFilterStatus('new')}>🆕 New</span>
              <span className={`filter-chip ${filterStatus==='inprogress'?'active':''}`} onClick={()=>setFilterStatus('inprogress')}>📖 In Progress</span>
              <span className={`filter-chip ${filterStatus==='completed'?'active':''}`} onClick={()=>setFilterStatus('completed')}>✅ Completed</span>
            </div>
            {subjects.length > 1 && (
              <div className="filters" style={{marginBottom:12}}>
                <span className={`filter-chip ${!filterSubject?'active':''}`} onClick={()=>setFilterSubject('')}>All</span>
                {subjects.map(s => <span key={s} className={`filter-chip ${filterSubject===s?'active':''}`} onClick={()=>setFilterSubject(filterSubject===s?'':s)}>{s}</span>)}
              </div>
            )}
            {user.yearLevel && !showAllYears && (
              <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:8}}>
                Showing courses for {user.yearLevel} and below. <button className="auth-link" style={{fontSize:11}} onClick={()=>setShowAllYears(true)}>Show all year levels</button>
              </div>
            )}
            {showAllYears && user.yearLevel && (
              <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:8}}>
                Showing all year levels. <button className="auth-link" style={{fontSize:11}} onClick={()=>setShowAllYears(false)}>Only show {user.yearLevel}</button>
              </div>
            )}

            {/* Quick stats bar */}
            {totalAttempts > 0 && (
              <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
                <div style={{flex:1,minWidth:70,padding:'8px 12px',background:'var(--bg-card)',borderRadius:'var(--radius-xs)',border:'1px solid var(--border)',textAlign:'center'}}>
                  <div style={{fontSize:18,fontWeight:800,color:'var(--primary-light)'}}>{totalAttempts}</div>
                  <div style={{fontSize:10,color:'var(--text-muted)'}}>Tests</div>
                </div>
                <div style={{flex:1,minWidth:70,padding:'8px 12px',background:'var(--bg-card)',borderRadius:'var(--radius-xs)',border:'1px solid var(--border)',textAlign:'center'}}>
                  <div style={{fontSize:18,fontWeight:800,color:avgScore>=70?'var(--success)':avgScore>=50?'var(--warning)':'var(--danger)'}}>{avgScore}%</div>
                  <div style={{fontSize:10,color:'var(--text-muted)'}}>Avg Score</div>
                </div>
                <div style={{flex:1,minWidth:70,padding:'8px 12px',background:'var(--bg-card)',borderRadius:'var(--radius-xs)',border:'1px solid var(--border)',textAlign:'center'}}>
                  <div style={{fontSize:18,fontWeight:800,color:'var(--accent)'}}>{coursesAccessed}</div>
                  <div style={{fontSize:10,color:'var(--text-muted)'}}>Courses</div>
                </div>
              </div>
            )}

            {/* Course cards */}
            {filtered.length > 0 ? (
              <div className="card-grid">
                {filtered.map((pkg,i) => {
                  const best = getBestScore(pkg.id);
                  const attempts = getAttemptCount(pkg.id);
                  const prog = getProgressForPkg(pkg.id);
                  return (
                    <div key={pkg.id} className="card browse-card fade-in" style={{animationDelay:`${i*.05}s`}}>
                      <div className="browse-subject">{pkg.subject}</div>
                      <div className="browse-title">{pkg.name}</div>
                      <div className="browse-desc">{pkg.description}</div>
                      <div className="pkg-meta-row">
                        {pkg.yearLevel && <span className="pkg-meta-tag">{pkg.yearLevel}</span>}
                        {best !== null && <span className="pkg-meta-tag" style={{background:best>=70?'rgba(0,184,148,.15)':best>=50?'rgba(253,203,110,.15)':'rgba(225,112,85,.15)',color:best>=70?'var(--success)':best>=50?'var(--warning)':'var(--danger)'}}>Best: {best}%</span>}
                        {attempts > 0 && <span className="pkg-meta-tag">{attempts} test{attempts!==1?'s':''}</span>}
                        {!prog && <span className="pkg-meta-tag" style={{background:'rgba(108,92,231,.15)',color:'var(--primary-light)'}}>🆕 New</span>}
                      </div>
                      <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:10}}>By {pkg.authorName}</div>
                      <div className="pkg-actions">
                        {pkg.facts.length > 0 && <button className="btn btn-primary btn-sm" onClick={()=>{recordAccess(pkg);setActivePkg(pkg);setScreen('learn');}}>⚡ Learn</button>}
                        <button className="btn btn-ghost btn-sm" onClick={()=>{
                          if(pkg.facts.length===0){alert('No content yet');return;} recordAccess(pkg);setActivePkg(pkg);setScreen('test-setup');
                        }}>📝 Test</button>
                        <button className="btn btn-sm" style={{background:'none',color:'var(--text-muted)',border:'none',fontSize:11}} onClick={()=>{setActivePkg(pkg);setScreen('course-detail');}}>📊</button>
                      </div>
                      {prog && !prog.completed && attempts > 0 && (
                        <button style={{background:'none',border:'none',color:'var(--text-muted)',fontSize:11,cursor:'pointer',marginTop:6,padding:0}} onClick={()=>markComplete(pkg.id)}>✓ Mark complete</button>
                      )}
                    </div>
                  );
                })}
              </div>
            ) : (
              <div className="empty-state">
                <div className="empty-icon">📖</div>
                <h3>{search ? 'No matches' : filterStatus==='completed' ? 'No completed courses' : filterStatus==='new' ? 'No new courses' : 'No courses available'}</h3>
                <p>{search ? 'Try different search terms' : 'Check back later for new content'}</p>
              </div>
            )}
          </div>
        )}

        {/* MY PROGRESS screen */}
        {screen === 'progress' && (
          <div className="page fade-in">
            <div className="page-header"><h1>📊 My Progress</h1><p>Your learning journey across all courses</p></div>

            {/* Overall stats */}
            <div style={{display:'flex',gap:10,marginBottom:20,flexWrap:'wrap'}}>
              {[{n:totalAttempts,l:'Total Tests',c:'var(--primary-light)'},{n:avgScore+'%',l:'Avg Score',c:avgScore>=70?'var(--success)':'var(--warning)'},{n:coursesAccessed,l:'Courses Started',c:'var(--accent)'},{n:coursesCompleted,l:'Completed',c:'var(--success)'}].map((s,i)=>(
                <div key={i} style={{flex:1,minWidth:80,padding:'14px',background:'var(--bg-card)',borderRadius:'var(--radius-sm)',border:'1px solid var(--border)',textAlign:'center'}}>
                  <div style={{fontSize:24,fontWeight:800,color:s.c}}>{s.n}</div>
                  <div style={{fontSize:11,color:'var(--text-muted)'}}>{s.l}</div>
                </div>
              ))}
            </div>

            {/* Per-course breakdown */}
            <h3 style={{fontSize:15,fontWeight:700,marginBottom:10}}>Course Breakdown</h3>
            {packages.map(pkg => {
              const results = getResultsForPkg(pkg.id);
              if (results.length === 0) return null;
              const best = Math.max(...results.map(r=>Math.round((r.correct/r.total)*100)));
              const latest = results[0] ? Math.round((results[0].correct/results[0].total)*100) : 0;
              const prog = getProgressForPkg(pkg.id);
              return (
                <div key={pkg.id} className="card" style={{marginBottom:8,padding:12,cursor:'pointer'}} onClick={()=>{setActivePkg(pkg);setScreen('course-detail');}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:14}}>{pkg.name}{prog?.completed && ' ✅'}</div>
                      <div style={{fontSize:12,color:'var(--text-muted)'}}>{results.length} test{results.length!==1?'s':''} · Best: {best}% · Latest: {latest}%</div>
                    </div>
                    <div style={{width:50,height:50,borderRadius:'50%',border:`3px solid ${best>=70?'var(--success)':best>=50?'var(--warning)':'var(--danger)'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:800}}>{best}%</div>
                  </div>
                </div>
              );
            }).filter(Boolean)}
            {myResults.length === 0 && <div className="empty-state"><div className="empty-icon">📝</div><h3>No test results yet</h3><p>Take a test to see your progress</p></div>}
          </div>
        )}

        {/* SOCIAL screen */}
        {screen === 'social' && (
          <div className="page fade-in">
            <div className="page-header"><h1>👥 Social</h1><p>Connect with other learners</p></div>

            {/* Search for learners */}
            <div className="card" style={{marginBottom:16,padding:14}}>
              <h3 style={{fontSize:14,fontWeight:700,marginBottom:8}}>Find Learners</h3>
              <div style={{display:'flex',gap:8}}>
                <input className="form-input" value={followSearch} onChange={e=>setFollowSearch(e.target.value)} placeholder="Search by email..." style={{flex:1}} onKeyDown={async e=>{if(e.key==='Enter'){const r=await DB.searchUsersByEmail(followSearch);setFollowSearchResults(r.filter(u=>u.uid!==user.id));}}} />
                <button className="btn btn-primary btn-sm" onClick={async()=>{const r=await DB.searchUsersByEmail(followSearch);setFollowSearchResults(r.filter(u=>u.uid!==user.id));}}>Search</button>
              </div>

                </div>
              ))}

                const fd = followingData[fid];
                if (!fd) return null;

                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>

                    <div style={{width:28,height:28,borderRadius:'50%',background:rank===0?'linear-gradient(135deg,#fdcb6e,#e17055)':rank===1?'linear-gradient(135deg,#dfe6e9,#b2bec3)':rank===2?'linear-gradient(135deg,#fdcb6e,#e17055)':'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:rank<3?14:12,fontWeight:800,color:rank<3?'white':'var(--text-muted)'}}>
                      {rank===0?'🥇':rank===1?'🥈':rank===2?'🥉':rank+1}

                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:entry.isMe?700:500}}>{entry.name}{entry.isMe?' (you)':''}</div>

              </div>
            ) : (
              <div>
                {following.map(fid => {
                  const fd = followingData[fid];
                  if (!fd || !fd.results?.length) return null;

                    <div key={`${fid}-${i}`} className="card" style={{marginBottom:4,padding:10}}>

                        <div style={{fontSize:16}}>📝</div>

                          <div style={{fontSize:10,color:'var(--text-muted)'}}>{r.timestamp ? new Date(r.timestamp).toLocaleDateString() : ''}</div>
                        </div>
                      </div>
                    </div>

                {following.every(fid => !followingData[fid]?.results?.length) && (
                  <div className="card" style={{padding:14,textAlign:'center'}}>
                    <p style={{fontSize:12,color:'var(--text-muted)'}}>No activity yet from people you follow</p>
                  </div>
                )}
              </div>
            )}

            {/* My badges */}
            <h3 style={{fontSize:15,fontWeight:700,margin:'20px 0 10px'}}>🏆 My Badges ({(gamData.badges||[]).length}/{BADGES.length})</h3>
            <div style={{display:'flex',flexWrap:'wrap',gap:8,paddingBottom:40}}>
              {BADGES.map(b => {
                const earned = (gamData.badges||[]).includes(b.id);
                return (
                  <div key={b.id} style={{padding:'10px',background:earned?'rgba(108,92,231,.1)':'var(--bg-card)',border:`1px solid ${earned?'var(--primary)':'var(--border)'}`,borderRadius:'var(--radius-sm)',textAlign:'center',width:80,opacity:earned?1:.4}}>
                    <div style={{fontSize:24}}>{b.icon}</div>
                    <div style={{fontSize:10,fontWeight:600,marginTop:2}}>{b.name}</div>
                    <div style={{fontSize:9,color:'var(--text-muted)'}}>{b.desc}</div>
                  </div>

              })}

          </div>
        )}

        {/* COURSE DETAIL screen */}
        {screen === 'course-detail' && activePkg && (
          <div className="page fade-in">
            <button className="nav-btn" style={{marginBottom:12}} onClick={goHome}>← Back to courses</button>
            <h2 style={{fontSize:20,fontWeight:800,marginBottom:4}}>{activePkg.name}</h2>
            <p style={{fontSize:13,color:'var(--text-secondary)',marginBottom:16}}>{activePkg.subject} · {activePkg.yearLevel}</p>

            {/* Actions */}
            <div style={{display:'flex',gap:8,marginBottom:16}}>
              <button className="btn btn-primary btn-sm" onClick={()=>{setScreen('learn');}}>⚡ Learn</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>{setScreen('test-setup');}}>📝 Test</button>
              {getProgressForPkg(activePkg.id)?.completed
                ? <button className="btn btn-sm btn-ghost" onClick={()=>markIncomplete(activePkg.id)}>↩ Reopen</button>
                : getAttemptCount(activePkg.id) > 0 && <button className="btn btn-sm btn-ghost" onClick={()=>markComplete(activePkg.id)}>✓ Complete</button>
              }
            </div>

            {/* Test history */}
            <h3 style={{fontSize:15,fontWeight:700,marginBottom:10}}>📈 Test History</h3>
            {getResultsForPkg(activePkg.id).length > 0 ? (
              <>
                {getResultsForPkg(activePkg.id).map((r,i) => (
                  <div key={r.id||i} className="card" style={{marginBottom:6,padding:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:600}}>{Math.round((r.correct/r.total)*100)}% — {r.correct}/{r.total} correct</div>
                        <div style={{fontSize:11,color:'var(--text-muted)'}}>{r.timestamp ? new Date(r.timestamp).toLocaleString() : ''}{r.elapsed ? ` · ${Math.floor(r.elapsed/60)}m ${r.elapsed%60}s` : ''}</div>
                      </div>
                      <div style={{width:40,height:40,borderRadius:'50%',background:Math.round((r.correct/r.total)*100)>=70?'rgba(0,184,148,.15)':'rgba(225,112,85,.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:800,color:Math.round((r.correct/r.total)*100)>=70?'var(--success)':'var(--danger)'}}>{Math.round((r.correct/r.total)*100)}%</div>
                    </div>
                  </div>
                ))}
              </>
            ) : <p style={{fontSize:13,color:'var(--text-muted)'}}>No tests taken yet for this course.</p>}

            {/* Feedback section */}
            {/* Dual ratings */}
            <h3 style={{fontSize:15,fontWeight:700,margin:'20px 0 10px'}}>⭐ Rate This Course</h3>
            <div style={{display:'flex',gap:16,marginBottom:12}}>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:600,color:'var(--text-secondary)',marginBottom:4}}>📚 Learning Content</div>
                <div style={{display:'flex',gap:2}}>
                  {[1,2,3,4,5].map(n => (
                    <button key={n} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',opacity:n<=learningRating?.9:.3}} onClick={()=>setLearningRating(n)}>⭐</button>
                  ))}
                </div>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:600,color:'var(--text-secondary)',marginBottom:4}}>📝 Test Quality</div>
                <div style={{display:'flex',gap:2}}>
                  {[1,2,3,4,5].map(n => (
                    <button key={n} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',opacity:n<=testingRating?.9:.3}} onClick={()=>setTestingRating(n)}>⭐</button>
                  ))}
                </div>
              </div>
            </div>
            {(learningRating > 0 || testingRating > 0) && (
              <button className="btn btn-sm btn-ghost" style={{marginBottom:12}} onClick={async()=>{
                await DB.saveRating(user.id, activePkg.id, { learning: learningRating, testing: testingRating });
                alert('Rating saved!'); }}>Save Rating</button>
            )}

            <h3 style={{fontSize:15,fontWeight:700,margin:'10px 0 10px'}}>💬 Send Feedback to Publisher</h3>
            <textarea className="form-textarea" value={feedbackText} onChange={e=>setFeedbackText(e.target.value)} placeholder="Share your thoughts... What worked? What could improve?" style={{minHeight:60,marginBottom:8}} />
            <button className="btn btn-primary btn-sm" onClick={()=>submitFeedback(activePkg)} disabled={!feedbackText.trim()}>📤 Send Feedback</button>
          </div>
        )}

        {screen === 'learn' && activePkg && (
          <MicroLearnMode facts={activePkg.facts} categories={activePkg.categories} onBack={goHome} user={user} packageId={activePkg.id} />
        )}

        {screen === 'test-setup' && activePkg && (
          <TestSetup pkg={activePkg} onStart={(config) => { setTestConfig(config); setScreen('test'); }} />
        )}

        {screen === 'test' && activePkg && testConfig && (
          <TestMode pkg={activePkg} config={testConfig} user={user}
            onTestComplete={async (result) => {
              setMyResults(prev => [result, ...prev]);
              // Award gamification XP
              if (user && firebaseConfigured) {
                const xpAmount = result.score >= 100 ? XP_VALUES.perfect_score : result.score >= 70 ? XP_VALUES.test_pass : XP_VALUES.test_complete;
                const reason = result.score >= 100 ? 'perfect_score' : 'test_complete';
                const { gamData: newGam, newBadges } = await awardXP(user.id, reason, xpAmount, gamData);
                setGamData(newGam);
                if (newBadges.length > 0) setNewBadgePopup(newBadges[0]);
              }
            }}
            onBack={goHome} />
        )}
      </div>
    </div>
  );
}

// ============================================================
// MICRO LEARN (Learner) — only uses research facts
// ============================================================
function MicroLearnMode({ facts, categories, onBack, user, packageId }) {
  const [viewMode, setViewMode] = useState('swipe');
  const [currentIndex, setCurrentIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [shuffledFacts] = useState(() => shuffle(facts));
  const [spacedRepMode, setSpacedRepMode] = useState(false);
  const [dueForReview, setDueForReview] = useState([]);

  // Load spaced rep data to prioritize cards due for review
  useEffect(() => {
    if (user && packageId && firebaseConfigured) {
      DB.getSpacedRepData(user.id, packageId).then(data => {
        const now = Date.now();
        const due = data.filter(d => !d.nextReview || d.nextReview <= now).map(d => d.factId);
        setDueForReview(due);
      });
    }
  }, []);

  // Spaced rep: sort due-for-review cards first
  const orderedFacts = useMemo(() => {
    if (!spacedRepMode || dueForReview.length === 0) return shuffledFacts;
    const dueFacts = shuffledFacts.filter(f => dueForReview.includes(f.id));
    const otherFacts = shuffledFacts.filter(f => !dueForReview.includes(f.id));
    return [...dueFacts, ...otherFacts];
  }, [spacedRepMode, dueForReview, shuffledFacts]);

  const activeFacts = orderedFacts;
  const progress = ((currentIndex+1)/activeFacts.length)*100;
  const next = () => { if(currentIndex<activeFacts.length-1){setFlipped(false);setTimeout(()=>setCurrentIndex(i=>i+1),100);} };
  const prev = () => { if(currentIndex>0){setFlipped(false);setTimeout(()=>setCurrentIndex(i=>i-1),100);} };

  const rateConfidence = async (level) => {
    // level: 0=forgot, 0.5=partly, 1=knew it
    if (user && packageId && firebaseConfigured) {
      const fact = activeFacts[currentIndex];
      await DB.saveFactConfidence(user.id, packageId, fact.id, level);
    }
    next();
  };

  const touchStart = useRef(null);
  const handleTS = (e) => { touchStart.current=e.touches[0].clientY; };
  const handleTE = (e) => { if(!touchStart.current)return; const d=touchStart.current-e.changedTouches[0].clientY; if(Math.abs(d)>60){d>0?next():prev();} touchStart.current=null; };

  if (facts.length === 0) return <div className="page"><div className="empty-state"><div className="empty-icon">📚</div><h3>No learning content</h3><p>This package doesn't have research material yet.</p></div></div>;

  return (
    <div className="microlearn">
      <div className="ml-progress">
        <div className="progress-bar"><div className="progress-fill" style={{width:`${progress}%`}}/></div>
        <div className="progress-text">{currentIndex+1}/{activeFacts.length}</div>
        {dueForReview.length > 0 && <div style={{fontSize:10,color:'var(--warning)',whiteSpace:'nowrap'}}>{dueForReview.length} due</div>}
      </div>
      <div className="mode-toggle">
        <button className={viewMode==='swipe'?'active':''} onClick={()=>setViewMode('swipe')}>🃏 Cards</button>
        <button className={viewMode==='scroll'?'active':''} onClick={()=>setViewMode('scroll')}>📜 Scroll</button>
        {dueForReview.length > 0 && <button className={spacedRepMode?'active':''} onClick={()=>setSpacedRepMode(!spacedRepMode)} style={{fontSize:10}}>🧠 Review</button>}
      </div>

      {viewMode==='swipe' ? (
        <>
          <div className="swipe-container" onTouchStart={handleTS} onTouchEnd={handleTE} onClick={()=>setFlipped(f=>!f)}>
            <div className="fact-card bounce-in" key={currentIndex}>
              <div className={`fact-card-inner ${flipped?'flipped':''}`}>
                <div className="fact-front">
                  <div className="fact-category">{shuffledFacts[currentIndex].category}</div>
                  <div className="fact-emoji">{getEmoji(currentIndex)}</div>
                  <div className="fact-text">{shuffledFacts[currentIndex].text}</div>
                  <div className="fact-hint">👆 Tap for details</div>
                </div>
                <div className="fact-back">
                  <div className="fact-category">💡 Details</div>
                  <div className="fact-text" style={{fontSize:15}}>{shuffledFacts[currentIndex].text}</div>
                  {shuffledFacts[currentIndex].detail && <div className="fact-detail">{shuffledFacts[currentIndex].detail}</div>}
                  <div className="fact-hint">👆 Tap to flip back</div>
                </div>
              </div>
            </div>
          </div>
          {/* Spaced rep confidence rating (shown when flipped) */}
          {flipped && user && packageId && (
            <div style={{display:'flex',justifyContent:'center',gap:8,padding:'8px 16px'}}>
              <button className="btn btn-sm" style={{background:'rgba(225,112,85,.15)',color:'var(--danger)',border:'1px solid var(--danger)',flex:1}} onClick={()=>rateConfidence(0)}>😕 Forgot</button>
              <button className="btn btn-sm" style={{background:'rgba(253,203,110,.15)',color:'var(--warning)',border:'1px solid var(--warning)',flex:1}} onClick={()=>rateConfidence(0.5)}>🤔 Partly</button>
              <button className="btn btn-sm" style={{background:'rgba(0,184,148,.15)',color:'var(--success)',border:'1px solid var(--success)',flex:1}} onClick={()=>rateConfidence(1)}>😊 Knew it</button>
            </div>
          )}
          <div className="swipe-nav">
            <button onClick={prev} disabled={currentIndex===0}>◀</button>
            <button className="primary-nav" onClick={()=>setFlipped(f=>!f)}>🔄</button>
            <button onClick={next} disabled={currentIndex===activeFacts.length-1}>▶</button>
          </div>
        </>
      ) : (
        <div className="scroll-container">
          {shuffledFacts.map((fact,i) => (
            <div key={fact.id} className="scroll-card">
              <div className="scroll-num">{i+1}</div>
              <div className="fact-category">{fact.category}</div>
              <div className="scroll-fact">{fact.text}</div>
              {fact.detail && <div className="scroll-detail">{fact.detail}</div>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ============================================================
// TEST SETUP (Learner)
// ============================================================
function TestSetup({ pkg, onStart }) {
  const [selectedCats, setSelectedCats] = useState([]);
  const [qCount, setQCount] = useState(10);
  const [testScope, setTestScope] = useState('all'); // 'all' or 'practice' (practice-test-style only)

  const toggleCat = (cat) => setSelectedCats(p=>p.includes(cat)?p.filter(c=>c!==cat):[...p,cat]);
  const hasPracticeTests = pkg.testPatterns && pkg.testPatterns.sampleQuestions.length > 0;

  return (
    <div className="page fade-in" style={{maxWidth:600,margin:'0 auto'}}>
      <div style={{textAlign:'center',marginBottom:20}}>
        <h2 style={{fontSize:20,fontWeight:800}}>📝 Test Setup</h2>
        <p style={{fontSize:13,color:'var(--text-secondary)'}}>{pkg.name}</p>
      </div>

      {/* Test scope toggle — only show if practice tests exist */}
      {hasPracticeTests && (
        <div style={{marginBottom:16}}>
          <h3 style={{fontSize:14,fontWeight:600,marginBottom:8}}>Test Style</h3>
          <div style={{display:'flex',gap:8}}>
            <div className={`card ${testScope==='all'?'':''}` } style={{flex:1,padding:12,cursor:'pointer',textAlign:'center',
              borderColor:testScope==='all'?'var(--primary)':'var(--border)',background:testScope==='all'?'rgba(108,92,231,.08)':'var(--bg-card)'}}
              onClick={()=>setTestScope('all')}>
              <div style={{fontSize:20,marginBottom:4}}>📚</div>
              <div style={{fontSize:13,fontWeight:700}}>Full Course</div>
              <div style={{fontSize:11,color:'var(--text-muted)'}}>Questions from all learning material</div>
            </div>
            <div className={`card`} style={{flex:1,padding:12,cursor:'pointer',textAlign:'center',
              borderColor:testScope==='practice'?'var(--accent)':'var(--border)',background:testScope==='practice'?'rgba(0,206,201,.08)':'var(--bg-card)'}}
              onClick={()=>setTestScope('practice')}>
              <div style={{fontSize:20,marginBottom:4}}>🎯</div>
              <div style={{fontSize:13,fontWeight:700}}>Exam Prep</div>
              <div style={{fontSize:11,color:'var(--text-muted)'}}>Questions matching practice test style & topics</div>
            </div>
          </div>
        </div>
      )}

      {pkg.categories.length > 1 && (
        <div style={{marginBottom:16}}>
          <h3 style={{fontSize:14,fontWeight:600,marginBottom:8}}>Filter by Category (optional)</h3>
          <div className="filters">
            {pkg.categories.map(cat => (
              <span key={cat} className={`filter-chip ${selectedCats.includes(cat)?'active':''}`} onClick={()=>toggleCat(cat)}>{cat}</span>
            ))}
          </div>
        </div>
      )}

      <div style={{marginBottom:16}}>
        <h3 style={{fontSize:14,fontWeight:600,marginBottom:8}}>Number of Questions</h3>
        <div style={{display:'flex',gap:8}}>
          {[5,10,15,20].map(n => (
            <button key={n} className={`filter-chip ${qCount===n?'active':''}`} style={{flex:1,textAlign:'center',justifyContent:'center'}} onClick={()=>setQCount(n)}>{n}</button>
          ))}
        </div>
      </div>

      <button className="btn btn-primary btn-lg" onClick={()=>onStart({categories:selectedCats,count:qCount,scope:testScope})}>
        Start Test →
      </button>
    </div>
  );
}

// ============================================================
// TEST MODE (Learner)
// ============================================================
function TestMode({ pkg, config, user, onTestComplete, onBack }) {
  const [questions] = useState(() =>
    generateQuestions(pkg.facts, pkg.categories, config.count, config.categories.length>0?config.categories:null, pkg.testPatterns, config.scope||'all')
  );
  const [currentQ, setCurrentQ] = useState(0);
  const [answer, setAnswer] = useState(null);
  const [submitted, setSubmitted] = useState(false);
  const [isCorrect, setIsCorrect] = useState(null);
  const [results, setResults] = useState([]);
  const [finished, setFinished] = useState(false);
  const [retrying, setRetrying] = useState(false);
  const [startTime] = useState(Date.now());
  const [elapsed, setElapsed] = useState(0);

  useEffect(() => { if(finished)return; const t=setInterval(()=>setElapsed(Math.floor((Date.now()-startTime)/1000)),1000); return ()=>clearInterval(t); }, [finished]);
  const fmt = (s) => `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;

  const q = questions[currentQ];

  // For selectall, answer is an array of selected indices
  const toggleSelectAll = (idx) => {
    if (submitted) return;
    const current = Array.isArray(answer) ? [...answer] : [];
    if (current.includes(idx)) setAnswer(current.filter(i=>i!==idx));
    else setAnswer([...current, idx]);
  };

  const check = () => {
    if(answer===null || answer==='' || (Array.isArray(answer) && answer.length===0)) return;
    let correct = false;
    switch(q.type){
      case 'mcq': correct = q.options[answer]?.correct === true; break;
      case 'truefalse': correct = answer === q.correctAnswer; break;
      case 'selectall': {
        // Check that ALL correct options are selected and NO wrong ones
        const selected = new Set(Array.isArray(answer) ? answer : []);
        const correctIdxs = q.options.map((o,i) => o.correct ? i : -1).filter(i=>i>=0);
        const wrongIdxs = q.options.map((o,i) => !o.correct ? i : -1).filter(i=>i>=0);
        const allCorrectSelected = correctIdxs.every(i => selected.has(i));
        const noWrongSelected = wrongIdxs.every(i => !selected.has(i));
        correct = allCorrectSelected && noWrongSelected;
        break;
      }
    }
    setIsCorrect(correct); setSubmitted(true);
    if(!retrying) setResults(p=>[...p,{question:q,answer,correct}]);
    else setResults(p=>{const u=[...p];u[u.length-1]={...u[u.length-1],retriedCorrect:correct};return u;});
  };

  const retry = () => { setAnswer(null); setSubmitted(false); setIsCorrect(null); setRetrying(true); };
  const next = () => {
    if(currentQ>=questions.length-1){
      setFinished(true);
      // Save test result to Firestore
      const correct = results.filter(r=>r.correct).length + (isCorrect ? 1 : 0);
      const total = questions.length;
      const resultData = { userId: user?.id, userName: user?.name, userEmail: user?.email, packageId: pkg.id, packageName: pkg.name, score: Math.round((correct/total)*100), total, correct, elapsed };
      if (firebaseConfigured && user) DB.saveTestResult(resultData);
      if (onTestComplete) onTestComplete(resultData);
      return;
    }
    setCurrentQ(i=>i+1); setAnswer(null); setSubmitted(false); setIsCorrect(null); setRetrying(false);
  };

  if (finished) return <ScoreScreen results={results} elapsed={elapsed} total={questions.length} onRetry={()=>{setCurrentQ(0);setAnswer(null);setSubmitted(false);setIsCorrect(null);setResults([]);setFinished(false);setRetrying(false);}} onHome={onBack} />;

  return (
    <div className="test-view">
      <div className="test-header">
        <div className="progress-bar" style={{flex:1}}><div className="progress-fill" style={{width:`${((currentQ+1)/questions.length)*100}%`}}/></div>
        <div className="test-q-num">Q{currentQ+1}/{questions.length}</div>
        <div className="test-timer">⏱ {fmt(elapsed)}</div>
      </div>
      <div className="test-content">
        <div className="test-question-card fade-in" key={`${currentQ}-${retrying}`}>
          <span className={`test-type-badge ${q.type}`}>
            {q.type==='mcq'?'🔘 Pick One':q.type==='truefalse'?'✅ True or False':'☑️ Select All That Apply'}
          </span>
          <div className="test-question">{q.question}</div>

          {/* MCQ — pick one */}
          {q.type==='mcq' && (
            <div className="mcq-options">
              {q.options.map((opt,i) => {
                let cls='mcq-option';
                if(submitted&&opt.correct) cls+=' correct';
                else if(submitted&&i===answer&&!opt.correct) cls+=' incorrect';
                else if(i===answer) cls+=' selected';
                if(submitted) cls+=' disabled';
                return <div key={i} className={cls} onClick={()=>!submitted&&setAnswer(i)}><div className="option-letter">{String.fromCharCode(65+i)}</div><div>{opt.text}</div></div>;
              })}
            </div>
          )}

          {/* True/False */}
          {q.type==='truefalse' && (
            <div className="tf-options">
              {[true,false].map(val => {
                let cls='tf-option';
                if(submitted&&val===q.correctAnswer) cls+=' correct';
                else if(submitted&&val===answer&&val!==q.correctAnswer) cls+=' incorrect';
                else if(val===answer) cls+=' selected';
                return <div key={String(val)} className={cls} onClick={()=>!submitted&&setAnswer(val)}>{val?'✅ True':'❌ False'}</div>;
              })}
            </div>
          )}

          {/* Select All That Apply — multi-select */}
          {q.type==='selectall' && (
            <div className="mcq-options">
              {q.options.map((opt,i) => {
                const sel = Array.isArray(answer) && answer.includes(i);
                let cls='mcq-option';
                if(submitted&&opt.correct) cls+=' correct';
                else if(submitted&&sel&&!opt.correct) cls+=' incorrect';
                else if(sel) cls+=' selected';
                if(submitted) cls+=' disabled';
                return <div key={i} className={cls} onClick={()=>toggleSelectAll(i)}>
                  <div className="option-letter" style={{borderRadius:4,fontSize:14}}>{sel?'✓':'　'}</div>
                  <div>{opt.text}</div>
                </div>;
              })}
            </div>
          )}

          <div className="test-submit">
            {!submitted ? (
              <button className="btn btn-primary btn-lg" onClick={check}
                disabled={answer===null || answer==='' || (Array.isArray(answer)&&answer.length===0)}>
                Check Answer
              </button>
            ) : (
              <>
                <div className={`feedback-box ${isCorrect?'correct':'incorrect'} ${!isCorrect?'shake':''}`}>
                  <div className="feedback-icon">{isCorrect?'🎉':'😔'}</div>
                  <div className="feedback-title">{isCorrect?'Correct!':'Not quite right'}</div>
                  <div className="feedback-explain">{q.explanation}</div>
                  {!isCorrect && (
                    <div className="feedback-answer">
                      {q.type==='mcq' && <>Correct answer: {q.options.find(o=>o.correct)?.text}</>}
                      {q.type==='truefalse' && <>Correct answer: {q.correctAnswer?'True':'False'}</>}
                      {q.type==='selectall' && <>Correct selections: {q.options.filter(o=>o.correct).map(o=>o.text).join('; ')}</>}
                    </div>
                  )}
                </div>
                <div style={{display:'flex',gap:8,marginTop:10}}>
                  {!isCorrect && !retrying && <button className="btn btn-lg" style={{background:'var(--warning)',color:'#000',flex:1}} onClick={retry}>🔄 Try Again</button>}
                  <button className="btn btn-primary btn-lg" style={{flex:1}} onClick={next}>{currentQ>=questions.length-1?'🏁 Finish':'Next →'}</button>
                </div>
              </>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// SCORE SCREEN
// ============================================================
function ScoreScreen({ results, elapsed, total, onRetry, onHome }) {
  const correct = results.filter(r=>r.correct).length;
  const pct = Math.round((correct/total)*100);
  const grade = pct>=80?'great':pct>=50?'ok':'needs-work';
  const msgs = { great:['Amazing! 🌟','You really know this material!'], ok:['Getting there! 💪','Keep practising!'], 'needs-work':['Keep going! 📚','Review and try again — you\'ve got this!'] };
  const fmt = (s) => `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;

  return (
    <div className="score-screen fade-in">
      <div className={`score-circle ${grade}`}>
        <div className="score-percent">{pct}%</div>
        <div className="score-label">Score</div>
      </div>
      <div className="score-message">{msgs[grade][0]}</div>
      <div className="score-detail">{msgs[grade][1]}</div>
      <div className="score-stats">
        <div className="score-stat"><div className="stat-num" style={{color:'var(--success)'}}>{correct}</div><div className="stat-label">Correct</div></div>
        <div className="score-stat"><div className="stat-num" style={{color:'var(--danger)'}}>{total-correct}</div><div className="stat-label">Wrong</div></div>
        <div className="score-stat"><div className="stat-num">{fmt(elapsed)}</div><div className="stat-label">Time</div></div>
      </div>

      {results.filter(r=>!r.correct).length>0 && (
        <div style={{width:'100%',textAlign:'left',marginBottom:20}}>
          <h3 style={{fontSize:14,fontWeight:700,marginBottom:10}}>📖 Review Missed Questions</h3>
          {results.filter(r=>!r.correct).map((r,i) => (
            <div key={i} className="card" style={{marginBottom:6,padding:12}}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>{r.question.question}</div>
              <div style={{fontSize:12,color:'var(--text-secondary)'}}>{r.question.explanation}</div>
            </div>
          ))}
        </div>
      )}

      <div style={{display:'flex',gap:10,width:'100%'}}>
        <button className="btn btn-primary btn-lg" onClick={onRetry}>🔄 Retry</button>
        <button className="btn btn-ghost btn-lg" onClick={onHome}>🏠 Home</button>
      </div>
    </div>
  );
}
