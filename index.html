// MENTOR APP — View and guide mentees
// ============================================================
function MentorApp({ user, onSwitchView, onLogout }) {
  const [mentees, setMentees] = useState([]);
  const [menteeData, setMenteeData] = useState({}); // {uid: {results, progress, gamification}}
  const [allUsers, setAllUsers] = useState([]);
  const [searchEmail, setSearchEmail] = useState('');
  const [searchResults, setSearchResults] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedMentee, setSelectedMentee] = useState(null);

  useEffect(() => {
    (async () => {
      const menteeIds = await DB.getMentees(user.id);
      const users = await DB.getAllUsers();
      const menteeUsers = users.filter(u => menteeIds.includes(u.uid));
      setMentees(menteeUsers);
      setAllUsers(users);
      // Load data for each mentee
      const data = {};
      for (const m of menteeUsers) {
        const [results, progress, gam] = await Promise.all([
          DB.getTestResultsForUser(m.uid), DB.getLearnerProgress(m.uid), DB.getGamification(m.uid)
        ]);
        data[m.uid] = { results, progress, gam };
      }
      setMenteeData(data);
      setLoading(false);
    })();
  }, []);

  const searchForLearner = async () => {
    if (!searchEmail.trim()) return;
    const results = await DB.searchUsersByEmail(searchEmail.trim());
    setSearchResults(results.filter(u => u.uid !== user.id));
  };

  const requestMentee = async (learner) => {
    await DB.sendMentorRequest(user.id, user.name, learner.uid);
    alert(`Mentor request sent to ${learner.name}. They need to approve it.`);
    setSearchEmail(''); setSearchResults([]);
  };

  return (
    <div className="app">
      <div className="gradient-bg" />
      <nav className="nav">
        <div className="nav-logo">StudyFlow</div>
        <div className="nav-right">
          <span className="nav-role" style={{background:'rgba(225,112,85,.15)',color:'#fdcb6e'}}>Mentor</span>
          {onSwitchView && <button className="nav-btn" onClick={()=>onSwitchView(null)}>Switch</button>}
          <span className="nav-user">{user.name}</span>
          <button className="nav-btn" onClick={onLogout}>Logout</button>
        </div>
      </nav>
      <div className="main">
        <div className="page fade-in">
          <div className="page-header"><h1>🧭 Mentor Dashboard</h1><p>Track and guide your learners</p></div>

          {/* Search & add mentees */}
          <div className="card" style={{marginBottom:16,padding:14}}>
            <h3 style={{fontSize:14,fontWeight:700,marginBottom:8}}>Add a Learner</h3>
            <div style={{display:'flex',gap:8}}>
              <input className="form-input" value={searchEmail} onChange={e=>setSearchEmail(e.target.value)} placeholder="Search by email..." style={{flex:1}} onKeyDown={e=>e.key==='Enter'&&searchForLearner()} />
              <button className="btn btn-primary btn-sm" onClick={searchForLearner}>Search</button>
            </div>
            {searchResults.map(u => (
              <div key={u.uid} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                <div><div style={{fontWeight:600,fontSize:13}}>{u.name}</div><div style={{fontSize:11,color:'var(--text-muted)'}}>{u.email}</div></div>
                <button className="btn btn-primary btn-sm" onClick={()=>requestMentee(u)}>Request</button>
              </div>
            ))}
          </div>

          {loading ? <div style={{textAlign:'center',padding:40}}><div className="processing-spinner" style={{margin:'0 auto'}}/></div> : (
            <>
              <h3 style={{fontSize:15,fontWeight:700,marginBottom:10}}>My Mentees ({mentees.length})</h3>
              {mentees.length === 0 ? (
                <div className="empty-state"><div className="empty-icon">🧭</div><h3>No mentees yet</h3><p>Search by email above to send a mentor request</p></div>
              ) : (
                <>
                  {mentees.map(m => {
                    const d = menteeData[m.uid] || { results:[], progress:[], gam:{} };
                    const avg = d.results.length ? Math.round(d.results.reduce((a,r)=>a+(r.correct/r.total)*100,0)/d.results.length) : 0;
                    const best = d.results.length ? Math.max(...d.results.map(r=>Math.round((r.correct/r.total)*100))) : 0;
                    return (
                      <div key={m.uid} className="card" style={{marginBottom:8,padding:14,cursor:'pointer'}} onClick={()=>setSelectedMentee(selectedMentee===m.uid?null:m.uid)}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                          <div>
                            <div style={{fontWeight:700,fontSize:15}}>{m.name}</div>
                            <div style={{fontSize:12,color:'var(--text-muted)'}}>{m.email} · Level {d.gam.level||1} · {d.gam.streak||0} day streak {d.gam.streak>=3?'🔥':''}</div>
                          </div>
                          <div style={{display:'flex',gap:10}}>
                            <div style={{textAlign:'center'}}><div style={{fontSize:18,fontWeight:800,color:'var(--primary-light)'}}>{d.results.length}</div><div style={{fontSize:9,color:'var(--text-muted)'}}>Tests</div></div>
                            <div style={{textAlign:'center'}}><div style={{fontSize:18,fontWeight:800,color:avg>=70?'var(--success)':'var(--warning)'}}>{avg}%</div><div style={{fontSize:9,color:'var(--text-muted)'}}>Avg</div></div>
                            <div style={{textAlign:'center'}}><div style={{fontSize:18,fontWeight:800,color:'var(--accent)'}}>{d.progress.length}</div><div style={{fontSize:9,color:'var(--text-muted)'}}>Courses</div></div>
                          </div>
                        </div>
                        {/* Expanded detail */}
                        {selectedMentee === m.uid && (
                          <div style={{marginTop:12,borderTop:'1px solid var(--border)',paddingTop:12}} className="fade-in">
                            <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:10}}>
                              <div style={{padding:'6px 12px',background:'var(--bg)',borderRadius:'var(--radius-xs)',fontSize:12}}><strong>XP:</strong> {d.gam.xp||0}</div>
                              <div style={{padding:'6px 12px',background:'var(--bg)',borderRadius:'var(--radius-xs)',fontSize:12}}><strong>Best streak:</strong> {d.gam.bestStreak||0} days</div>
                              <div style={{padding:'6px 12px',background:'var(--bg)',borderRadius:'var(--radius-xs)',fontSize:12}}><strong>Badges:</strong> {(d.gam.badges||[]).length}</div>
                              <div style={{padding:'6px 12px',background:'var(--bg)',borderRadius:'var(--radius-xs)',fontSize:12}}><strong>Completed:</strong> {d.progress.filter(p=>p.completed).length} courses</div>
                            </div>
                            <h4 style={{fontSize:13,fontWeight:700,marginBottom:6}}>Recent Tests</h4>
                            {d.results.slice(0,10).map((r,i) => (
                              <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',fontSize:12,borderBottom:'1px solid var(--border)'}}>
                                <span>{r.packageName||'Course'} — {r.correct}/{r.total}</span>
                                <span style={{color:r.score>=70?'var(--success)':'var(--danger)',fontWeight:700}}>{r.score}%</span>
                              </div>
                            ))}
                            {d.results.length === 0 && <p style={{fontSize:12,color:'var(--text-muted)'}}>No tests taken yet</p>}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// ADMIN APP — User management, approvals, notifications
// ============================================================
function AdminApp({ user, onSwitchView, onLogout }) {
  const [users, setUsers] = useState([]);
  const [notifications, setNotifications] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState('users'); // users, notifications

  useEffect(() => { loadData(); }, []);

  const loadData = async () => {
    setLoading(true);
    const [allUsers, notifs] = await Promise.all([DB.getAllUsers(), DB.getNotifications()]);
    setUsers(allUsers);
    setNotifications(notifs);
    setLoading(false);
  };

  const approveUser = async (uid) => {
    await DB.updateUserRole(uid, undefined, 'approved');
    setUsers(prev => prev.map(u => u.uid === uid ? { ...u, status: 'approved' } : u));
  };

  const rejectUser = async (uid) => {
    await DB.updateUserRole(uid, undefined, 'rejected');
    setUsers(prev => prev.map(u => u.uid === uid ? { ...u, status: 'rejected' } : u));
  };

  const toggleUserRole = async (uid, role) => {
    const u = users.find(x => x.uid === uid);
    if (!u) return;
    const currentRoles = u.roles || [];
    const newRoles = currentRoles.includes(role) ? currentRoles.filter(r => r !== role) : [...currentRoles, role];
    if (newRoles.length === 0) { alert('User must have at least one role'); return; }
    await DB.updateUserRole(uid, newRoles, undefined);
    setUsers(prev => prev.map(x => x.uid === uid ? { ...x, roles: newRoles } : x));
  };

  const pendingUsers = users.filter(u => u.status === 'pending');
  const approvedUsers = users.filter(u => u.status === 'approved' || !u.status);
  const rejectedUsers = users.filter(u => u.status === 'rejected');
  const unreadNotifs = notifications.filter(n => !n.read).length;

  return (
    <div className="app">
      <div className="gradient-bg" />
      <nav className="nav">
        <div className="nav-logo">StudyFlow</div>
        <div className="nav-right">
          <span className="nav-role" style={{background:'rgba(225,112,85,.15)',color:'var(--danger)'}}>Admin</span>
          {onSwitchView && <button className="nav-btn" onClick={()=>onSwitchView(null)}>Switch Role</button>}
          <span className="nav-user">{user.name}</span>
          <button className="nav-btn" onClick={onLogout}>Logout</button>
        </div>
      </nav>
      <div className="main">
        <div className="page fade-in">
          <div className="page-header">
            <h1>🛡️ Admin Dashboard</h1>
            <p>Manage users, approvals, and system settings</p>
          </div>

          <div className="tabs">
            <button className={`tab ${tab==='users'?'active':''}`} onClick={()=>setTab('users')}>
              👥 Users ({users.length}){pendingUsers.length > 0 && <span style={{background:'var(--danger)',color:'white',borderRadius:10,padding:'1px 6px',fontSize:10,marginLeft:6}}>{pendingUsers.length}</span>}
            </button>
            <button className={`tab ${tab==='notifications'?'active':''}`} onClick={()=>setTab('notifications')}>
              🔔 Notifications{unreadNotifs > 0 && <span style={{background:'var(--danger)',color:'white',borderRadius:10,padding:'1px 6px',fontSize:10,marginLeft:6}}>{unreadNotifs}</span>}
            </button>
          </div>

          {loading ? (
            <div style={{textAlign:'center',padding:40}}><div className="processing-spinner" style={{margin:'0 auto 16px'}}/><p>Loading...</p></div>
          ) : tab === 'users' ? (
            <div className="fade-in">
              {/* Pending approvals */}
              {pendingUsers.length > 0 && (
                <div style={{marginBottom:24}}>
                  <h3 style={{fontSize:15,fontWeight:700,marginBottom:10,color:'var(--warning)'}}>⏳ Pending Approval ({pendingUsers.length})</h3>
                  {pendingUsers.map(u => (
                    <div key={u.uid} className="card" style={{marginBottom:8,padding:14,borderColor:'rgba(253,203,110,.3)'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
                        <div>
                          <div style={{fontWeight:700,fontSize:14}}>{u.name || 'Unknown'}</div>
                          <div style={{fontSize:12,color:'var(--text-muted)'}}>{u.email}</div>
                          <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>
                            Requested: {(u.roles||[]).join(', ')} · {u.createdAt ? new Date(u.createdAt).toLocaleDateString() : 'Unknown date'}
                          </div>
                        </div>
                        <div style={{display:'flex',gap:6}}>
                          <button className="btn btn-success btn-sm" onClick={()=>approveUser(u.uid)}>✓ Approve</button>
                          <button className="btn btn-danger btn-sm" onClick={()=>rejectUser(u.uid)}>✗ Reject</button>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {/* Approved users */}
              <h3 style={{fontSize:15,fontWeight:700,marginBottom:10}}>✅ Active Users ({approvedUsers.length})</h3>
              {approvedUsers.map(u => (
                <div key={u.uid} className="card" style={{marginBottom:6,padding:12}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:14,display:'flex',alignItems:'center',gap:6}}>
                        {u.name || 'Unknown'}
                        {u.email === SYSTEM_ADMIN_EMAIL && <span style={{fontSize:10,background:'rgba(225,112,85,.15)',color:'var(--danger)',padding:'1px 6px',borderRadius:10}}>System Admin</span>}
                      </div>
                      <div style={{fontSize:12,color:'var(--text-muted)'}}>{u.email}</div>
                    </div>
                    <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                      {['learner','author','admin'].map(role => (
                        <button key={role} className="btn btn-sm"
                          style={{
                            background: (u.roles||[]).includes(role) ? (role==='admin'?'var(--danger)':role==='author'?'var(--primary)':'var(--accent)') : 'var(--bg)',
                            color: (u.roles||[]).includes(role) ? 'white' : 'var(--text-muted)',
                            border: `1px solid ${(u.roles||[]).includes(role) ? 'transparent' : 'var(--border)'}`,
                            fontSize:11, padding:'4px 10px'
                          }}
                          onClick={()=>toggleUserRole(u.uid, role)}>
                          {role==='learner'?'🎓 Learner':role==='author'?'✏️ Publisher':role==='admin'?'🛡️ Admin':''}
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              ))}

              {/* Rejected users */}
              {rejectedUsers.length > 0 && (
                <div style={{marginTop:20}}>
                  <h3 style={{fontSize:15,fontWeight:700,marginBottom:10,color:'var(--text-muted)'}}>❌ Rejected ({rejectedUsers.length})</h3>
                  {rejectedUsers.map(u => (
                    <div key={u.uid} className="card" style={{marginBottom:6,padding:12,opacity:.6}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <div>
                          <div style={{fontWeight:600,fontSize:13}}>{u.name || 'Unknown'} — {u.email}</div>
                        </div>
                        <button className="btn btn-success btn-sm" onClick={()=>approveUser(u.uid)}>Reinstate</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          ) : (
            <div className="fade-in">
              {notifications.length === 0 ? (
                <div className="empty-state"><div className="empty-icon">🔔</div><h3>No notifications</h3><p>You'll see signup requests and system events here</p></div>
              ) : notifications.map(n => (
                <div key={n.id} className="card" style={{marginBottom:6,padding:12,opacity:n.read?.7:1,borderColor:!n.read?'rgba(108,92,231,.3)':'var(--border)'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                    <div>
                      <div style={{fontSize:13,fontWeight:n.read?400:600}}>{n.message}</div>
                      <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{n.createdAt ? new Date(n.createdAt).toLocaleString() : ''}</div>
                    </div>
                    {!n.read && <button className="btn btn-sm btn-ghost" onClick={async()=>{await DB.markNotificationRead(n.id);setNotifications(prev=>prev.map(x=>x.id===n.id?{...x,read:true}:x));}}>Mark read</button>}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// AUTHOR APP (now called Publisher internally)
// ============================================================
function AuthorApp({ user, packages, setPackages, onSavePkg, onDeletePkg, onSwitchView, onLogout }) {
  const [screen, setScreen] = useState('dashboard'); // dashboard, editor, analytics
  const [editingPkg, setEditingPkg] = useState(null);
  const [processing, setProcessing] = useState(false);
  const [search, setSearch] = useState('');
  const [analyticsData, setAnalyticsData] = useState(null);
  const [analyticsPkg, setAnalyticsPkg] = useState(null);
  const [allFeedback, setAllFeedback] = useState([]);

  const isOwnerOf = (p) => p.authorId === user.id || p.authorId === 'demo-author';
  const isCollaboratorOf = (p) => (p.collaborators||[]).some(c => c.email === user.email);
  const getMyRole = (p) => isOwnerOf(p) ? 'owner' : isCollaboratorOf(p) ? (p.collaborators||[]).find(c=>c.email===user.email)?.role||'contributor' : null;

  const myPackages = packages.filter(p => {
    const canAccess = isOwnerOf(p) || isCollaboratorOf(p);
    if (!canAccess) return false;
    if (search) { const q=search.toLowerCase(); return (p.name||'').toLowerCase().includes(q)||(p.subject||'').toLowerCase().includes(q)||(p.yearLevel||'').toLowerCase().includes(q); }
    return true;
  });

  const createNew = (template) => {
    const t = template || {};
    const newPkg = {
      id: genId(), name: t.name===undefined ? '' : (t.name||''), subject: t.subject||'', yearLevel: t.yearLevel||'', description: t.description||'',
      status: 'draft', autoResearch: t.autoResearch||false, authorId: user.id, authorName: user.name,
      createdAt: Date.now(), updatedAt: Date.now(),
      content: [], facts: [], categories: [], testPatterns: null
    };
    setEditingPkg(newPkg);
    setScreen('editor');
  };
  const [showTemplates, setShowTemplates] = useState(false);

  const editPkg = (pkg) => { setEditingPkg({...pkg}); setScreen('editor'); };

  const savePkg = (pkg) => {
    pkg.updatedAt = Date.now();
    onSavePkg(pkg);
    setScreen('dashboard');
    setEditingPkg(null);
  };

  const deletePkg = (id) => {
    if (confirm('Delete this learning package?')) onDeletePkg(id);
  };

  const togglePublish = (id) => {
    const pkg = packages.find(p=>p.id===id);
    if (!pkg) return;
    let updated;
    if (pkg.status==='draft') {
      if (!pkg.name) { alert('Package needs a name before publishing.'); return; }
      if (pkg.facts.length===0 && !pkg.autoResearch) { alert('Package needs either content or Auto-Research enabled before publishing.'); return; }
      if (pkg.facts.length===0 && pkg.autoResearch) {
        if (!pkg.subject && !pkg.name && (!pkg.testPatterns || pkg.testPatterns.topicsCovered.length===0)) { alert('Auto-Research requires a name, subject, or practice test to generate content.'); return; }
        const result = generateAutoResearchContent(pkg.subject, pkg.yearLevel, pkg.name, pkg.testPatterns);
        updated = {...pkg, status:'published', updatedAt:Date.now(), facts:result.facts, categories:result.categories, autoResearchGenerated:true, autoResearchNote:result.note};
      } else {
        updated = {...pkg, status:'published', updatedAt:Date.now()};
      }
    } else {
      updated = {...pkg, status:'draft', updatedAt:Date.now()};
    }
    onSavePkg(updated);
    // Notify learners about new course
    if (updated.status === 'published' && pkg.status !== 'published') {
      notifyLearners(updated.name, updated.id);
    }
  };

  return (
    <div className="app">
      <div className="gradient-bg" />
      <nav className="nav">
        {screen !== 'dashboard' ? (
          <button className="nav-btn" onClick={()=>{setScreen('dashboard');setEditingPkg(null);}}>← Back</button>
        ) : <div />}
        <div className="nav-logo">StudyFlow</div>
        <div className="nav-right">
          <span className="nav-role author">Publisher</span>
          {onSwitchView && <button className="nav-btn" onClick={()=>onSwitchView(null)}>Switch Role</button>}
          <span className="nav-user">{user.name}</span>
          <button className="nav-btn" onClick={onLogout}>Logout</button>
        </div>
      </nav>
      <div className="main">
        {screen === 'dashboard' && (
          <div className="page fade-in">
            <div className="page-header" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}}>
              <div>
                <h1>My Learning Packages</h1>
                <p>Create and manage study content for learners</p>
              </div>
              <button className="btn btn-primary" onClick={()=>setShowTemplates(true)}>+ New Package</button>
            </div>
            {/* Search + tabs */}
            <input className="form-input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search your packages..." style={{marginBottom:12,fontSize:14}} />
            <div className="tabs" style={{marginBottom:12}}>
              <button className={`tab ${screen==='dashboard'?'active':''}`} onClick={()=>setScreen('dashboard')}>📦 Packages</button>
              <button className={`tab ${screen==='analytics'?'active':''}`} onClick={()=>{
                setScreen('analytics');
                // Load all test results and feedback
                Promise.all([DB.getAllTestResults(), DB.getAllFeedback()]).then(([res, fb]) => { setAnalyticsData(res); setAllFeedback(fb); });
              }}>📊 Analytics</button>
            </div>
            {myPackages.length > 0 ? (
              <div className="card-grid">
                {myPackages.map((pkg,i) => (
                  <div key={pkg.id} className="card pkg-card fade-in" style={{animationDelay:`${i*.05}s`}}>
                    <div className="pkg-top">
                      <div className="pkg-title">{pkg.name || 'Untitled Package'}</div>
                      <span className={`status-badge ${pkg.status}`}>{pkg.status}</span>
                    </div>
                    <div className="pkg-desc">{pkg.description || 'No description'}</div>
                    <div className="pkg-meta-row">
                      {pkg.subject && <span className="pkg-meta-tag">{pkg.subject}</span>}
                      {pkg.yearLevel && <span className="pkg-meta-tag">{pkg.yearLevel}</span>}
                      {pkg.autoResearch && <span className="pkg-meta-tag">🔍 Auto-research</span>}
                    </div>
                    <div className="pkg-stats">
                      <span>📄 {pkg.content.length} file{pkg.content.length!==1?'s':''}</span>
                      <span>💡 {pkg.facts.length} facts{pkg.autoResearchGenerated ? ' ✨' : ''}</span>
                      <span>📂 {pkg.categories.length} categories</span>
                    </div>
                    {pkg.content.length === 0 && pkg.autoResearch && pkg.facts.length === 0 && (
                      <div style={{fontSize:11,color:'var(--warning)',marginTop:4}}>⚠️ No content — will auto-generate on publish</div>
                    )}
                    <div className="pkg-actions">
                      <button className="btn btn-ghost btn-sm" onClick={(e)=>{e.stopPropagation();editPkg(pkg);}}>✏️ Edit</button>
                      <button className="btn btn-sm" onClick={(e)=>{e.stopPropagation();togglePublish(pkg.id);}}
                        style={{background: pkg.status==='published'?'var(--warning)':'var(--success)', color: pkg.status==='published'?'#000':'#fff'}}>
                        {pkg.status==='published' ? '⏸ Unpublish' : '🚀 Publish'}
                      </button>
                      {isOwnerOf(pkg) && <button className="btn btn-danger btn-sm" onClick={(e)=>{e.stopPropagation();deletePkg(pkg.id);}}>🗑</button>}
                      {isCollaboratorOf(pkg) && !isOwnerOf(pkg) && <span style={{fontSize:10,color:'var(--text-muted)',padding:'4px 8px'}}>Contributor</span>}
                      <button className="btn btn-sm" style={{background:'none',color:'var(--accent)',border:'1px solid var(--accent)',fontSize:11}} onClick={(e)=>{
                        e.stopPropagation(); setAnalyticsPkg(pkg); setScreen('analytics');
                        Promise.all([DB.getTestResultsForPackage(pkg.id), DB.getFeedbackForPackage(pkg.id), DB.getProgressForPackage(pkg.id)]).then(([res,fb,prog]) => {
                          setAnalyticsData(res); setAllFeedback(fb);
                        });
                      }}>📊</button>
                    </div>
                  </div>
                ))}
              </div>
            ) : (
              <div className="empty-state">
                <div className="empty-icon">📦</div>
                <h3>{search ? 'No matches' : 'No packages yet'}</h3>
                <p>{search ? 'Try different search terms' : 'Create your first learning package to get started'}</p>
              </div>
            )}
          </div>
        )}

        {/* PUBLISHER ANALYTICS */}
        {screen === 'analytics' && (
          <div className="page fade-in">
            <button className="nav-btn" style={{marginBottom:12}} onClick={()=>{setScreen('dashboard');setAnalyticsPkg(null);}}>← Back to packages</button>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
              <div>
                <h1 style={{fontSize:22,fontWeight:800,marginBottom:4}}>📊 {analyticsPkg ? analyticsPkg.name : 'All Courses'} Analytics</h1>
                <p style={{fontSize:13,color:'var(--text-secondary)'}}>{ analyticsPkg ? 'Detailed performance' : 'Overview across all courses'}</p>
              </div>
              {analyticsData && analyticsData.length > 0 && (
                <div style={{display:'flex',gap:6}}>
                  <button className="btn btn-ghost btn-sm" onClick={()=>exportToCSV(analyticsData.map(r=>({Student:r.userName||r.userEmail,Course:r.packageName,Score:r.score+'%',Correct:r.correct+'/'+r.total,Date:r.timestamp?new Date(r.timestamp).toLocaleDateString():''})), 'studyflow-results.csv')}>📥 CSV</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>exportToPDF('StudyFlow Test Results', analyticsData.map(r=>({Student:r.userName||r.userEmail,Course:r.packageName,Score:r.score+'%',Correct:r.correct+'/'+r.total,Date:r.timestamp?new Date(r.timestamp).toLocaleDateString():''})), 'studyflow-results.pdf')}>📄 PDF</button>
                </div>
              )}
            </div>

            {analyticsData === null ? (
              <div style={{textAlign:'center',padding:40}}><div className="processing-spinner" style={{margin:'0 auto 12px'}}/><p>Loading analytics...</p></div>
            ) : (
              <>
                {/* Summary stats */}
                <div style={{display:'flex',gap:10,marginBottom:20,flexWrap:'wrap'}}>
                  {[
                    {n:analyticsData.length, l:'Total Tests Taken', c:'var(--primary-light)'},
                    {n:[...new Set(analyticsData.map(r=>r.userId))].length, l:'Unique Learners', c:'var(--accent)'},
                    {n:analyticsData.length ? Math.round(analyticsData.reduce((a,r)=>a+r.score,0)/analyticsData.length) + '%' : '—', l:'Avg Score', c:'var(--success)'},
                    {n:analyticsData.filter(r=>r.score>=70).length, l:'Passing (70%+)', c:'var(--success)'},
                  ].map((s,i) => (
                    <div key={i} style={{flex:1,minWidth:80,padding:'14px',background:'var(--bg-card)',borderRadius:'var(--radius-sm)',border:'1px solid var(--border)',textAlign:'center'}}>
                      <div style={{fontSize:24,fontWeight:800,color:s.c}}>{s.n}</div>
                      <div style={{fontSize:10,color:'var(--text-muted)'}}>{s.l}</div>
                    </div>
                  ))}
                </div>

                {/* Per-student breakdown */}
                <h3 style={{fontSize:15,fontWeight:700,marginBottom:10}}>👥 Student Performance</h3>
                {(() => {
                  const byStudent = {};
                  analyticsData.forEach(r => {
                    if (!byStudent[r.userId]) byStudent[r.userId] = { name: r.userName||r.userEmail, email: r.userEmail, results: [] };
                    byStudent[r.userId].results.push(r);
                  });
                  const students = Object.entries(byStudent).map(([uid, data]) => ({
                    uid, ...data,
                    avg: Math.round(data.results.reduce((a,r)=>a+r.score,0)/data.results.length),
                    best: Math.max(...data.results.map(r=>r.score)),
                    latest: data.results[0]?.score || 0,
                    count: data.results.length
                  }));
                  return students.length > 0 ? students.sort((a,b)=>b.latest-a.latest).map(s => (
                    <div key={s.uid} className="card" style={{marginBottom:6,padding:12}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
                        <div>
                          <div style={{fontWeight:700,fontSize:14}}>{s.name}</div>
                          <div style={{fontSize:11,color:'var(--text-muted)'}}>{s.email} · {s.count} test{s.count!==1?'s':''}</div>
                        </div>
                        <div style={{display:'flex',gap:8}}>
                          <div style={{textAlign:'center'}}><div style={{fontSize:16,fontWeight:800,color:s.avg>=70?'var(--success)':s.avg>=50?'var(--warning)':'var(--danger)'}}>{s.avg}%</div><div style={{fontSize:9,color:'var(--text-muted)'}}>Avg</div></div>
                          <div style={{textAlign:'center'}}><div style={{fontSize:16,fontWeight:800,color:'var(--accent)'}}>{s.best}%</div><div style={{fontSize:9,color:'var(--text-muted)'}}>Best</div></div>
                          <div style={{textAlign:'center'}}><div style={{fontSize:16,fontWeight:800}}>{s.latest}%</div><div style={{fontSize:9,color:'var(--text-muted)'}}>Latest</div></div>
                        </div>
                      </div>
                    </div>
                  )) : <p style={{fontSize:13,color:'var(--text-muted)'}}>No test results yet.</p>;
                })()}

                {/* Recent test results */}
                <h3 style={{fontSize:15,fontWeight:700,margin:'20px 0 10px'}}>📝 Recent Test Results</h3>
                {analyticsData.slice(0,20).map((r,i) => (
                  <div key={r.id||i} className="card" style={{marginBottom:4,padding:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:600}}>{r.userName||'Unknown'} — {r.packageName||'Course'}</div>
                        <div style={{fontSize:11,color:'var(--text-muted)'}}>{r.timestamp ? new Date(r.timestamp).toLocaleString() : ''}</div>
                      </div>
                      <div style={{fontSize:16,fontWeight:800,color:r.score>=70?'var(--success)':r.score>=50?'var(--warning)':'var(--danger)'}}>{r.score}%</div>
                    </div>
                  </div>
                ))}

                {/* Feedback */}
                {allFeedback.length > 0 && (
                  <>
                    <h3 style={{fontSize:15,fontWeight:700,margin:'20px 0 10px'}}>💬 Feedback ({allFeedback.length})</h3>
                    {allFeedback.map((f,i) => (
                      <div key={f.id||i} className="card" style={{marginBottom:6,padding:12,borderLeft:'3px solid var(--primary)'}}>
                        <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                          <div style={{fontWeight:600,fontSize:13}}>{f.userName} on "{f.packageName}"</div>
                          <div style={{fontSize:11,color:'var(--text-muted)'}}>{f.timestamp ? new Date(f.timestamp).toLocaleString() : ''}</div>
                        </div>
                        {f.rating > 0 && <div style={{marginBottom:4}}>{'⭐'.repeat(f.rating)}{'☆'.repeat(5-f.rating)}</div>}
                        <div style={{fontSize:13,color:'var(--text-secondary)'}}>{f.message}</div>
                      </div>
                    ))}
                  </>
                )}
              </>
            )}
          </div>
        )}

        {/* Template picker overlay */}
        {showTemplates && (
          <div className="overlay" onClick={()=>setShowTemplates(false)}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
              <div className="modal-header"><h2>Create New Package</h2><button className="modal-close" onClick={()=>setShowTemplates(false)}>✕</button></div>
              <p style={{fontSize:13,color:'var(--text-secondary)',marginBottom:16}}>Start from a template or create from scratch:</p>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                <div className="card" style={{cursor:'pointer',textAlign:'center',padding:16}} onClick={()=>{setShowTemplates(false);createNew({name:''})}}>
                  <div style={{fontSize:28}}>📄</div>
                  <div style={{fontSize:13,fontWeight:700,marginTop:4}}>Blank</div>
                  <div style={{fontSize:10,color:'var(--text-muted)'}}>Start from scratch</div>
                </div>
                {DEFAULT_TEMPLATES.filter(t=>t.id!=='blank').map(t => (
                  <div key={t.id} className="card" style={{cursor:'pointer',textAlign:'center',padding:16}} onClick={()=>{setShowTemplates(false);createNew(t);}}>
                    <div style={{fontSize:28}}>{t.icon}</div>
                    <div style={{fontSize:13,fontWeight:700,marginTop:4}}>{t.name}</div>
                    <div style={{fontSize:10,color:'var(--text-muted)'}}>{t.description?.slice(0,40)||t.subject||'Template'}</div>
                  </div>
                ))}
              </div>

              {/* Bulk invite section */}
              <div style={{marginTop:20,borderTop:'1px solid var(--border)',paddingTop:16}}>
                <h3 style={{fontSize:14,fontWeight:700,marginBottom:8}}>📧 Bulk Invite Students</h3>
                <p style={{fontSize:12,color:'var(--text-muted)',marginBottom:8}}>Paste emails (one per line or comma-separated) to generate invite links:</p>
                <textarea className="form-textarea" id="bulk-invite" placeholder="student1@email.com&#10;student2@email.com&#10;student3@email.com" style={{minHeight:60,fontSize:12}} />
                <button className="btn btn-ghost btn-sm" style={{marginTop:6}} onClick={()=>{
                  const el = document.getElementById('bulk-invite');
                  const emails = el.value.split(/[,\n]/).map(e=>e.trim()).filter(e=>e.includes('@'));
                  if (emails.length===0) { alert('No valid emails found'); return; }
                  const link = window.location.href.split('?')[0];
                  const text = `You're invited to StudyFlow!\n\nSign up here: ${link}\n\nCreate an account as a Student to access learning courses.\n\nInvited emails:\n${emails.join('\n')}`;
                  navigator.clipboard.writeText(text).then(()=>alert(`Invite text copied for ${emails.length} students! Paste it into an email.`)).catch(()=>{
                    prompt('Copy this invite text:', text);
                  });
                }}>📋 Copy Invite Text</button>
                <button className="btn btn-ghost btn-sm" style={{marginTop:6,marginLeft:6}} onClick={()=>{
                  const el = document.getElementById('bulk-invite');
                  const emails = el.value.split(/[,\n]/).map(e=>e.trim()).filter(e=>e.includes('@'));
                  if (emails.length===0) return;
                  exportToCSV(emails.map(e=>({email:e,role:'learner',invite_link:window.location.href.split('?')[0]})), 'studyflow-invites.csv');
                }}>📥 Export as CSV</button>
              </div>
            </div>
          </div>
        )}

        {screen === 'editor' && editingPkg && (
          <PackageEditor pkg={editingPkg} onSave={savePkg} onCancel={()=>{setScreen('dashboard');setEditingPkg(null);}} userId={user.id} />
        )}
      </div>
      {processing && <div className="processing"><div className="processing-spinner" /><h3>Processing...</h3></div>}
    </div>
  );
}

// ============================================================
// PACKAGE EDITOR (Author)
// ============================================================
function PackageEditor({ pkg, onSave, onCancel, userId }) {
  const [data, setData] = useState({...pkg});
  const [processing, setProcessing] = useState(false);
  const [activeTab, setActiveTab] = useState('details');
  const [otherSubject, setOtherSubject] = useState(SUBJECTS.includes(pkg.subject) ? '' : pkg.subject);
  const fileRef = useRef();
  // AI config
  const [aiConfig, setAiConfig] = useState(null); // { provider, apiKey }
  const [aiKeyInput, setAiKeyInput] = useState('');
  const [aiProvider, setAiProvider] = useState('anthropic');
  const [showAiSetup, setShowAiSetup] = useState(false);
  const [aiConfigLoaded, setAiConfigLoaded] = useState(false);
  // Fact editing
  const [editingFact, setEditingFact] = useState(null); // {index, text, detail, category}

  // Load AI config on mount
  useEffect(() => {
    if (userId && firebaseConfigured && !aiConfigLoaded) {
      DB.getAiConfig(userId).then(cfg => { setAiConfig(cfg); setAiConfigLoaded(true); if(cfg){setAiProvider(cfg.provider);} });
    }
  }, [userId, aiConfigLoaded]);

  const update = (key, val) => setData(d=>({...d,[key]:val}));

  const handleFiles = async (files, contentType) => {
    setProcessing(true);
    try {
      const newContent = [...data.content];
      let allResearchText = data.content.filter(c=>c.type===CONTENT_TYPES.RESEARCH).map(c=>c.text).join('\n\n');
      let allTestText = data.content.filter(c=>c.type===CONTENT_TYPES.PRACTICE_TEST).map(c=>c.text).join('\n\n');

      for (const file of files) {
        const text = await parseFile(file);
        if (text.trim().length < 20) { alert(`"${file.name}" doesn't seem to have enough text content.`); continue; }
        newContent.push({ id:genId(), name:file.name, type:contentType, text, addedAt:Date.now() });
        if (contentType === CONTENT_TYPES.RESEARCH) allResearchText += '\n\n' + text;
        else allTestText += '\n\n' + text;
      }

      // Re-process all research content for facts
      const topicName = data.name || data.subject || 'Study Material';
      const { facts, categories } = allResearchText.trim()
        ? extractResearchFacts(allResearchText, topicName)
        : { facts: [], categories: [] };

      // Re-process practice test content for patterns
      const testPatterns = allTestText.trim() ? extractTestPatterns(allTestText) : null;

      setData(d => ({...d, content:newContent, facts, categories, testPatterns }));
    } catch(err) {
      alert('Error processing file: ' + err.message);
    }
    setProcessing(false);
  };

  const removeContent = (id) => {
    const newContent = data.content.filter(c=>c.id!==id);
    // Recompute facts
    const topicName = data.name || data.subject || 'Study Material';
    const researchText = newContent.filter(c=>c.type===CONTENT_TYPES.RESEARCH).map(c=>c.text).join('\n\n');
    const testText = newContent.filter(c=>c.type===CONTENT_TYPES.PRACTICE_TEST).map(c=>c.text).join('\n\n');
    const { facts, categories } = researchText.trim() ? extractResearchFacts(researchText, topicName) : { facts:[], categories:[] };
    const testPatterns = testText.trim() ? extractTestPatterns(testText) : null;
    setData(d => ({...d, content:newContent, facts, categories, testPatterns}));
  };

  const runAutoResearch = async () => {
    if (!data.subject && !data.name && (!data.testPatterns || data.testPatterns.topicsCovered.length === 0)) {
      alert('Please set a package name/subject, or upload a practice test first so we know what to research.'); return;
    }
    setProcessing(true);

    let result;
    // Use real AI if API key is configured
    if (aiConfig && aiConfig.apiKey) {
      result = await aiAutoResearch(data.subject, data.yearLevel, data.name, data.testPatterns, aiConfig.apiKey, aiConfig.provider);
      // If AI failed, fall back to built-in
      if (result.error || result.facts.length === 0) {
        const fallback = generateAutoResearchContent(data.subject, data.yearLevel, data.name, data.testPatterns);
        result = { ...fallback, note: (result.note || '') + ' Fell back to built-in content.' };
      }
    } else {
      // No AI key — use built-in knowledge bank
      result = generateAutoResearchContent(data.subject, data.yearLevel, data.name, data.testPatterns);
    }

    // Merge with existing facts
    const existingTexts = new Set(data.facts.map(f=>f.text));
    const newFacts = result.facts.filter(f=>!existingTexts.has(f.text));
    const allFacts = [...data.facts, ...newFacts];
    const allCats = [...new Set([...data.categories, ...result.categories])];

    setData(d => ({
      ...d, facts: allFacts, categories: allCats,
      autoResearchGenerated: true, autoResearchNote: result.note || 'Content generated'
    }));
    setProcessing(false);
  };

  // Save/remove AI API key
  const saveAiKey = async () => {
    if (!aiKeyInput.trim()) return;
    const config = { provider: aiProvider, apiKey: aiKeyInput.trim() };
    if (userId && firebaseConfigured) await DB.saveAiConfig(userId, config);
    setAiConfig(config);
    setShowAiSetup(false);
    setAiKeyInput('');
  };
  const removeAiKey = async () => {
    if (userId && firebaseConfigured) await DB.deleteAiConfig(userId);
    setAiConfig(null);
  };

  // Edit/delete individual facts
  const updateFact = (index, updated) => {
    setData(d => ({ ...d, facts: d.facts.map((f,i) => i===index ? {...f,...updated} : f) }));
    setEditingFact(null);
  };
  const deleteFact = (index) => {
    setData(d => ({ ...d, facts: d.facts.filter((_,i) => i!==index) }));
  };

  const save = () => {
    if (!data.name.trim()) { alert('Please give your package a name.'); return; }
    // If auto-research is on but no content, require subject or name
    if (data.facts.length === 0 && data.autoResearch && !data.subject) {
      alert('With Auto-Research enabled and no uploaded content, please set a Subject so we know what to research.'); return;
    }
    // If auto-research is on AND no content, auto-generate on save
    if (data.facts.length === 0 && data.autoResearch) {
      const result = generateAutoResearchContent(data.subject, data.yearLevel, data.name, data.testPatterns);
      data.facts = result.facts;
      data.categories = result.categories;
      data.autoResearchGenerated = true;
      data.autoResearchNote = result.note;
    }
    onSave(data);
  };

  const researchContent = data.content.filter(c=>c.type===CONTENT_TYPES.RESEARCH);
  const practiceContent = data.content.filter(c=>c.type===CONTENT_TYPES.PRACTICE_TEST);

  return (
    <div className="page fade-in" style={{paddingBottom:100}}>
      <div className="page-header" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}}>
        <div>
          <h1>{data.id === pkg.id && pkg.name ? 'Edit Package' : 'New Package'}</h1>
          <p>Configure your learning package details and content</p>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-ghost" onClick={onCancel}>Cancel</button>
          <button className="btn btn-primary" onClick={save}>💾 Save Package</button>
        </div>
      </div>

      <div className="tabs">
        <button className={`tab ${activeTab==='details'?'active':''}`} onClick={()=>setActiveTab('details')}>📋 Details</button>
        <button className={`tab ${activeTab==='content'?'active':''}`} onClick={()=>setActiveTab('content')}>📄 Content ({data.content.length})</button>
        <button className={`tab ${activeTab==='preview'?'active':''}`} onClick={()=>setActiveTab('preview')}>👁 Preview</button>
      </div>

      {activeTab === 'details' && (
        <div className="fade-in">
          <div className="form-group">
            <label className="form-label">Package Name *</label>
            <input className="form-input" value={data.name} onChange={e=>update('name',e.target.value)} placeholder="e.g. Year 8 Algebra Fundamentals" />
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Subject *</label>
              <select className="form-select" value={SUBJECTS.includes(data.subject)?data.subject:'Other'} onChange={e=>{
                if(e.target.value==='Other') { update('subject', otherSubject||''); }
                else { update('subject', e.target.value); setOtherSubject(''); }
              }}>
                <option value="">Select subject...</option>
                {SUBJECTS.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
              {(!SUBJECTS.includes(data.subject) && (data.subject || otherSubject !== undefined)) && data.subject !== '' && (
                <input className="form-input" style={{marginTop:6}} value={data.subject} onChange={e=>{update('subject',e.target.value);setOtherSubject(e.target.value);}} placeholder="Enter custom subject..." />
              )}
              {/* Show custom input when Other is selected */}
            </div>
            <div className="form-group">
              <label className="form-label">Year Level *</label>
              <select className="form-select" value={data.yearLevel} onChange={e=>update('yearLevel',e.target.value)}>
                <option value="">Select year...</option>
                {YEAR_LEVELS.map(y=><option key={y} value={y}>{y}</option>)}
              </select>
            </div>
          </div>

          {!SUBJECTS.includes(data.subject) && data.subject === '' && (
            <div className="form-group" style={{marginTop:-10}}>
              <input className="form-input" value={otherSubject} onChange={e=>{setOtherSubject(e.target.value); update('subject',e.target.value);}} placeholder="Type custom subject name..." />
            </div>
          )}

          <div className="form-group">
            <label className="form-label">Description</label>
            <textarea className="form-textarea" value={data.description} onChange={e=>update('description',e.target.value)} placeholder="Describe what this package covers..." />
          </div>

          {/* Course Collaboration */}
          <div className="form-group">
            <label className="form-label">Collaborators (optional)</label>
            <div className="form-hint" style={{marginBottom:6}}>Add other publishers by email. You are the owner; they can edit content.</div>
            <div style={{display:'flex',gap:6,marginBottom:6}}>
              <input className="form-input" id="collab-email" placeholder="publisher@email.com" style={{flex:1}} onKeyDown={e=>{
                if(e.key==='Enter'){const em=e.target.value.trim();if(em){update('collaborators',[...(data.collaborators||[]),{email:em,role:'contributor'}]);e.target.value='';}}
              }} />
              <button className="btn btn-ghost btn-sm" onClick={()=>{const el=document.getElementById('collab-email');const em=el?.value?.trim();if(em){update('collaborators',[...(data.collaborators||[]),{email:em,role:'contributor'}]);el.value='';}}}>Add</button>
            </div>
            {(data.collaborators||[]).map((c,i) => (
              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 8px',background:'var(--bg)',borderRadius:'var(--radius-xs)',marginBottom:4,fontSize:12}}>
                <span>{c.email} — <select style={{background:'transparent',border:'none',color:'var(--text-secondary)',fontSize:11}} value={c.role} onChange={e=>{
                  const updated=[...(data.collaborators||[])]; updated[i]={...updated[i],role:e.target.value}; update('collaborators',updated);
                }}><option value="contributor">Contributor</option><option value="owner">Owner</option></select></span>
                <button style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:12}} onClick={()=>update('collaborators',(data.collaborators||[]).filter((_,j)=>j!==i))}>✕</button>
              </div>
            ))}
          </div>

        </div>
      )}

      {activeTab === 'content' && (
        <div className="fade-in">
          {/* Research Content Section */}
          <div style={{marginBottom:24}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div>
                <h3 style={{fontSize:15,fontWeight:700}}>📚 Research / Learning Content</h3>
                <p style={{fontSize:12,color:'var(--text-muted)'}}>Textbook material, notes, study guides — used to teach and generate tests</p>
              </div>
            </div>
            <div className="upload-area" onClick={()=>document.getElementById('research-upload').click()}>
              <h4>📄 Upload learning material</h4>
              <p>PDF, TXT, DOCX, MD, HTML</p>
              <div className="upload-formats"><span>PDF</span><span>TXT</span><span>DOCX</span><span>MD</span></div>
              <input id="research-upload" type="file" multiple accept=".pdf,.txt,.md,.docx,.doc,.html,.htm,.csv"
                onChange={e=>{ if(e.target.files.length) handleFiles(Array.from(e.target.files), CONTENT_TYPES.RESEARCH); e.target.value=''; }} />
            </div>
            {researchContent.map(c => (
              <div key={c.id} className="content-item">
                <div className="ci-icon">📄</div>
                <div className="ci-info">
                  <div className="ci-name">{c.name}</div>
                  <div className="ci-meta">{(c.text.length/1000).toFixed(1)}k chars</div>
                </div>
                <span className="content-type-badge research">Research</span>
                <button className="ci-btn" onClick={()=>removeContent(c.id)}>✕</button>
              </div>
            ))}

            {/* Auto-generated facts display */}
            {researchContent.length === 0 && data.autoResearchGenerated && data.facts.length > 0 && (
              <div className="card fade-in" style={{background:'rgba(0,184,148,.08)',borderColor:'rgba(0,184,148,.3)',padding:14,marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:20}}>✅</span>
                    <div>
                      <div style={{fontSize:14,fontWeight:700,color:'var(--success)'}}>Auto-Research Complete</div>
                      <div style={{fontSize:12,color:'var(--text-secondary)'}}>{data.facts.length} facts generated across {data.categories.length} categories</div>
                    </div>
                  </div>
                  <button className="btn btn-sm btn-ghost" onClick={runAutoResearch}>🔄 Regenerate</button>
                </div>
                {data.autoResearchNote && (
                  <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:10,fontStyle:'italic'}}>{data.autoResearchNote}</div>
                )}
                <div style={{fontSize:12,fontWeight:600,color:'var(--text-secondary)',marginBottom:6}}>Generated categories:</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:10}}>
                  {data.categories.map(c => <span key={c} className="filter-chip" style={{fontSize:11,padding:'3px 10px'}}>{c}</span>)}
                </div>
                <div style={{fontSize:12,fontWeight:600,color:'var(--text-secondary)',marginBottom:6}}>Sample facts ({Math.min(5, data.facts.length)} of {data.facts.length}):</div>
                {data.facts.slice(0,5).map((f,i) => (
                  <div key={f.id} style={{display:'flex',gap:8,alignItems:'flex-start',padding:'6px 0',borderBottom: i<4?'1px solid var(--border)':'none'}}>
                    <span style={{fontSize:14,flexShrink:0}}>{['💡','📌','🔑','📎','⭐'][i]}</span>
                    <div>
                      <div style={{fontSize:12,fontWeight:500,lineHeight:1.4}}>{f.text}</div>
                      <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>{f.category}</div>
                    </div>
                  </div>
                ))}
                {data.facts.length > 5 && (
                  <div style={{fontSize:11,color:'var(--text-muted)',textAlign:'center',marginTop:8}}>...and {data.facts.length - 5} more facts</div>
                )}
              </div>
            )}

            {/* Empty state - no files AND no generated content */}
            {researchContent.length === 0 && !(data.autoResearchGenerated && data.facts.length > 0) && (
              <div style={{textAlign:'center',padding:12}}>
                <p style={{fontSize:12,color:'var(--text-muted)'}}>
                  {data.autoResearch
                    ? 'No files uploaded — Auto-Research will generate learning content when you save'
                    : 'No research content yet — upload files or enable Auto-Research below'}
                </p>
              </div>
            )}
          </div>

          {/* Practice Test Section */}
          <div style={{marginBottom:24}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div>
                <h3 style={{fontSize:15,fontWeight:700}}>📝 Practice Test Content</h3>
                <p style={{fontSize:12,color:'var(--text-muted)'}}>Sample exams and practice tests — used to shape test style and question formats (NOT taught as facts)</p>
              </div>
            </div>
            <div className="upload-area" onClick={()=>document.getElementById('practice-upload').click()}>
              <h4>📝 Upload practice tests</h4>
              <p>Example exams, past papers, practice questions</p>
              <div className="upload-formats"><span>PDF</span><span>TXT</span><span>DOCX</span></div>
              <input id="practice-upload" type="file" multiple accept=".pdf,.txt,.md,.docx,.doc,.html,.htm,.csv"
                onChange={e=>{ if(e.target.files.length) handleFiles(Array.from(e.target.files), CONTENT_TYPES.PRACTICE_TEST); e.target.value=''; }} />
            </div>
            {practiceContent.map(c => (
              <div key={c.id} className="content-item">
                <div className="ci-icon">📝</div>
                <div className="ci-info">
                  <div className="ci-name">{c.name}</div>
                  <div className="ci-meta">{(c.text.length/1000).toFixed(1)}k chars</div>
                </div>
                <span className="content-type-badge practice">Practice Test</span>
                <button className="ci-btn" onClick={()=>removeContent(c.id)}>✕</button>
              </div>
            ))}
            {practiceContent.length === 0 && <p style={{fontSize:12,color:'var(--text-muted)',textAlign:'center',padding:8}}>No practice tests uploaded — tests will use dynamically generated question formats. Upload practice tests to guide question style.</p>}
          </div>

          {/* Auto-Research Toggle + AI Setup */}
          <div className="card" style={{marginBottom:16,padding:14,borderColor: data.autoResearch ? 'rgba(108,92,231,.3)' : 'var(--border)', background: data.autoResearch ? 'rgba(108,92,231,.04)' : 'var(--bg-card)'}}>
            <div className="form-toggle" onClick={()=>update('autoResearch',!data.autoResearch)}>
              <div className={`toggle-track ${data.autoResearch?'on':''}`}><div className="toggle-thumb"/></div>
              <div>
                <div className="toggle-label" style={{fontSize:14,fontWeight:700}}>🔍 Auto-Research Mode</div>
                <div className="toggle-desc">Uses AI to generate learning content from your subject, year level, and practice tests</div>
              </div>
            </div>

            {data.autoResearch && (
              <div style={{marginTop:10}}>
                {/* AI API Key Status */}
                <div style={{padding:10,background:'rgba(108,92,231,.06)',borderRadius:'var(--radius-xs)',marginBottom:8}}>
                  {aiConfig && aiConfig.apiKey ? (
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <div>
                        <div style={{fontSize:12,color:'var(--success)',fontWeight:600}}>✅ {aiConfig.provider === 'anthropic' ? 'Claude' : 'ChatGPT'} API connected</div>
                        <div style={{fontSize:11,color:'var(--text-muted)'}}>Key: ...{aiConfig.apiKey.slice(-8)}</div>
                      </div>
                      <div style={{display:'flex',gap:4}}>
                        <button className="btn btn-sm btn-ghost" onClick={()=>{setShowAiSetup(true);setAiKeyInput(aiConfig.apiKey);setAiProvider(aiConfig.provider);}}>Update</button>
                        <button className="btn btn-sm btn-danger" onClick={removeAiKey}>Remove</button>
                      </div>
                    </div>
                  ) : (
                    <div>
                      <div style={{fontSize:12,color:'var(--warning)',fontWeight:600,marginBottom:4}}>⚠️ No AI API key configured</div>
                      <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:8}}>Without an API key, auto-research uses a limited built-in knowledge bank. Add a Claude or ChatGPT key for real AI-generated content.</div>
                      <button className="btn btn-primary btn-sm" onClick={()=>setShowAiSetup(true)}>🔑 Set Up AI Key</button>
                    </div>
                  )}
                </div>

                {/* AI Key Setup Form */}
                {showAiSetup && (
                  <div className="card fade-in" style={{padding:12,marginBottom:8,background:'var(--bg)',borderColor:'var(--primary)'}}>
                    <h4 style={{fontSize:13,fontWeight:700,marginBottom:8}}>🔑 AI API Key Setup</h4>
                    <div style={{marginBottom:8}}>
                      <label className="form-label">AI Provider</label>
                      <div style={{display:'flex',gap:6}}>
                        <button className={`filter-chip ${aiProvider==='anthropic'?'active':''}`} onClick={()=>setAiProvider('anthropic')}>Claude (Anthropic)</button>
                        <button className={`filter-chip ${aiProvider==='openai'?'active':''}`} onClick={()=>setAiProvider('openai')}>ChatGPT (OpenAI)</button>
                      </div>
                    </div>
                    <div style={{marginBottom:8}}>
                      <label className="form-label">API Key</label>
                      <input className="form-input" type="password" value={aiKeyInput} onChange={e=>setAiKeyInput(e.target.value)}
                        placeholder={aiProvider==='anthropic' ? 'sk-ant-api03-...' : 'sk-proj-...'} />
                      <div className="form-hint">
                        {aiProvider==='anthropic'
                          ? 'Get your key from console.anthropic.com → API Keys'
                          : 'Get your key from platform.openai.com → API Keys'}
                        . Your key is stored securely in your account and never shared.
                      </div>
                    </div>
                    <div style={{display:'flex',gap:6}}>
                      <button className="btn btn-primary btn-sm" onClick={saveAiKey} disabled={!aiKeyInput.trim()}>💾 Save Key</button>
                      <button className="btn btn-ghost btn-sm" onClick={()=>{setShowAiSetup(false);setAiKeyInput('');}}>Cancel</button>
                    </div>
                  </div>
                )}

                {/* Status message */}
                <div style={{fontSize:12,color:'var(--primary-light)'}}>
                  {data.content.length === 0
                    ? '✨ Auto-Research will generate learning material when you save.'
                    : data.content.some(c=>c.type===CONTENT_TYPES.PRACTICE_TEST) && !data.content.some(c=>c.type===CONTENT_TYPES.RESEARCH)
                      ? '✨ Practice tests will guide AI to generate relevant learning content on save.'
                      : '✨ AI will supplement your existing content with additional material on save.'}
                </div>
              </div>
            )}
            {data.autoResearchNote && (
              <div style={{marginTop:8,fontSize:11,color:'var(--accent)',fontStyle:'italic'}}>ℹ️ {data.autoResearchNote}</div>
            )}
          </div>

          {/* Editable Facts List */}
          {data.facts.length > 0 && (
            <div className="card" style={{marginBottom:16,padding:14}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                <h4 style={{fontSize:14,fontWeight:700}}>📝 Facts ({data.facts.length})</h4>
                <span style={{fontSize:11,color:'var(--text-muted)'}}>Click to edit, ✕ to delete</span>
              </div>
              <div style={{maxHeight:300,overflowY:'auto'}}>
                {data.facts.map((f,i) => (
                  <div key={f.id||i} style={{padding:'8px 10px',borderBottom:'1px solid var(--border)',display:'flex',gap:8,alignItems:'flex-start'}}>
                    {editingFact?.index === i ? (
                      <div style={{flex:1}}>
                        <input className="form-input" style={{marginBottom:4,fontSize:12}} value={editingFact.text} onChange={e=>setEditingFact({...editingFact,text:e.target.value})} />
                        <input className="form-input" style={{marginBottom:4,fontSize:12}} value={editingFact.detail} onChange={e=>setEditingFact({...editingFact,detail:e.target.value})} placeholder="Detail/explanation..." />
                        <div style={{display:'flex',gap:4}}>
                          <input className="form-input" style={{flex:1,fontSize:12}} value={editingFact.category} onChange={e=>setEditingFact({...editingFact,category:e.target.value})} placeholder="Category" />
                          <button className="btn btn-primary btn-sm" onClick={()=>updateFact(i,{text:editingFact.text,detail:editingFact.detail,category:editingFact.category})}>✓</button>
                          <button className="btn btn-ghost btn-sm" onClick={()=>setEditingFact(null)}>✕</button>
                        </div>
                      </div>
                    ) : (
                      <>
                        <div style={{flex:1,cursor:'pointer',minWidth:0}} onClick={()=>setEditingFact({index:i,text:f.text,detail:f.detail||'',category:f.category||''})}>
                          <div style={{fontSize:12,fontWeight:500,lineHeight:1.4}}>{f.text}</div>
                          <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>{f.category}{f.aiGenerated ? ' · 🤖 AI' : ''}</div>
                        </div>
                        <button style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:12,padding:'2px 4px',flexShrink:0}} onClick={()=>deleteFact(i)}>✕</button>
                      </>
                    )}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Stats summary */}
          {(data.facts.length > 0 || data.testPatterns) && (
            <div className="card" style={{background:'rgba(108,92,231,.05)',borderColor:'rgba(108,92,231,.2)'}}>
              <h4 style={{fontSize:14,fontWeight:700,marginBottom:8}}>📊 Content Analysis</h4>
              <div style={{display:'flex',gap:16,flexWrap:'wrap',fontSize:13}}>
                <span>💡 <strong>{data.facts.length}</strong> facts {data.autoResearchGenerated ? '(incl. auto-generated)' : 'extracted'}</span>
                <span>📂 <strong>{data.categories.length}</strong> categories</span>
                {data.testPatterns && <span>📝 <strong>{data.testPatterns.sampleQuestions.length}</strong> practice questions detected</span>}
                {data.testPatterns && <span>🎯 Test styles: {data.testPatterns.questionStyles.join(', ')}</span>}
              </div>
              {data.testPatterns && data.testPatterns.topicsCovered.length > 0 && (
                <div style={{marginTop:8,fontSize:12,color:'var(--text-secondary)'}}>
                  📋 Topics from practice tests: {data.testPatterns.topicsCovered.slice(0,8).join(', ')}
                  {data.autoResearch && <span style={{color:'var(--accent)'}}> — these will guide auto-research content</span>}
                </div>
              )}
              {!researchContent.length && practiceContent.length > 0 && !data.autoResearch && (
                <div style={{marginTop:8,padding:8,background:'rgba(253,203,110,.1)',borderRadius:'var(--radius-xs)',fontSize:12,color:'var(--warning)'}}>
                  ⚠️ You have practice tests but no learning content. Tests will be generated dynamically, but students won't have Learn mode material. Consider uploading research content or enabling Auto-Research.
                </div>
              )}
              {!researchContent.length && practiceContent.length > 0 && data.autoResearch && data.facts.length === 0 && (
                <div style={{marginTop:8,padding:8,background:'rgba(0,206,201,.1)',borderRadius:'var(--radius-xs)',fontSize:12,color:'var(--accent)'}}>
                  ✨ Practice tests will guide Auto-Research to generate relevant learning content when you save.
                </div>
              )}
            </div>
          )}

          {data.facts.length === 0 && !data.testPatterns && data.autoResearch && (
            <div className="card" style={{background:'rgba(108,92,231,.05)',borderColor:'rgba(108,92,231,.2)',textAlign:'center',padding:16}}>
              <p style={{fontSize:13}}>No content uploaded yet. Auto-Research is enabled — content will be generated when you click <strong>Save Package</strong>.</p>
              <p style={{fontSize:11,color:'var(--text-muted)',marginTop:6}}>Based on {data.subject || 'your topic'} {data.yearLevel ? `• ${data.yearLevel}` : ''}</p>
            </div>
          )}
        </div>
      )}

      {activeTab === 'preview' && (
        <div className="fade-in">
          {data.facts.length === 0 ? (
            <div className="empty-state">
              <div className="empty-icon">👁</div>
              <h3>Nothing to preview</h3>
              <p>Add research content first, then preview what students will see</p>
            </div>
          ) : (
            <>
              <div className="card" style={{marginBottom:12}}>
                <h3 style={{fontSize:16,fontWeight:700,marginBottom:8}}>{data.name || 'Untitled'}</h3>
                <div className="pkg-meta-row">
                  {data.subject && <span className="pkg-meta-tag">{data.subject}</span>}
                  {data.yearLevel && <span className="pkg-meta-tag">{data.yearLevel}</span>}
                </div>
                <p style={{fontSize:13,color:'var(--text-secondary)'}}>Students will see {data.facts.length} learning facts across {data.categories.length} categories.</p>
              </div>
              <h4 style={{fontSize:14,fontWeight:700,marginBottom:8}}>Sample Facts (first 5):</h4>
              {data.facts.slice(0,5).map((f,i) => (
                <div key={f.id} className="content-item" style={{marginBottom:4}}>
                  <div className="ci-icon">{getEmoji(i)}</div>
                  <div className="ci-info">
                    <div className="ci-name" style={{whiteSpace:'normal',fontSize:12}}>{f.text}</div>
                    <div className="ci-meta">{f.category}</div>
                  </div>
                </div>
              ))}
              <h4 style={{fontSize:14,fontWeight:700,margin:'16px 0 8px'}}>Categories:</h4>
              <div className="filters">
                {data.categories.map(c => <span key={c} className="filter-chip">{c}</span>)}
              </div>
            </>
          )}
        </div>
      )}

      {processing && (
        <div className="processing">
          <div className="processing-spinner" />
          <h3>{data.autoResearch && researchContent.length === 0 ? '🔍 Researching Content...' : 'Processing files...'}</h3>
          <p>{data.autoResearch && researchContent.length === 0
            ? `Generating ${data.subject || 'study'} content for ${data.yearLevel || 'your year level'}...`
            : 'Extracting content and analysing...'}</p>
        </div>
      )}
    </div>
  );
}
